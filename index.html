.rec-pulse{animation:pu .8s infinite}

<script>
const V='1.0.0';
const FYLKER=[
{id:'oslo',name:'Oslo',kommuner:['Oslo']},
{id:'viken',name:'Viken',kommuner:['Bærum','Asker','Drammen','Fredrikstad','Sarpsborg','Lillestrøm','Ski','Moss','Halden','Kongsberg']},
{id:'vestland',name:'Vestland',kommuner:['Bergen','Askøy','Stord','Knarvik']},
{id:'rogaland',name:'Rogaland',kommuner:['Stavanger','Sandnes','Haugesund','Sola','Randaberg']},
{id:'trondelag',name:'Trøndelag',kommuner:['Trondheim','Steinkjer','Stjørdal','Levanger','Namsos']},
{id:'nordland',name:'Nordland',kommuner:['Bodø','Narvik','Mo i Rana','Sortland']},
{id:'troms',name:'Troms og Finnmark',kommuner:['Tromsø','Alta','Harstad','Hammerfest']},
{id:'vestfold',name:'Vestfold og Telemark',kommuner:['Tønsberg','Skien','Sandefjord','Porsgrunn','Larvik']},
{id:'innlandet',name:'Innlandet',kommuner:['Hamar','Lillehammer','Gjøvik','Elverum','Kongsvinger']},
{id:'agder',name:'Agder',kommuner:['Kristiansand','Arendal','Grimstad','Mandal']},
{id:'more',name:'Møre og Romsdal',kommuner:['Ålesund','Molde','Kristiansund']}
];
const DEFAULT_GROUPS=[
{name:'Hjelp',tpl:true},{name:'Småjobber',tpl:true},{name:'Nabolagshjelp',tpl:true},{name:'Lokale tjenester',tpl:true}
];
const ls=k=>localStorage.getItem(k),ss=(k,v)=>localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v)),$=id=>document.getElementById(id),uid=()=>'m'+Date.now().toString(36)+Math.random().toString(36).substr(2,5),now=()=>Date.now(),esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ab64=b=>btoa(String.fromCharCode(...new Uint8Array(b))),b64ab=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer;
const escA=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\\/g,'&#92;').replace(/\n/g,'&#10;').replace(/\r/g,'&#13;');
const ago=ts=>{if(!ts)return'';const s=Math.floor((now()-ts)/1000);if(s<60)return'nå';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'t';return Math.floor(s/86400)+'d';};
const starStr=(n,mx=5)=>'★'.repeat(n)+'☆'.repeat(mx-n);
const T={no:{home:'Hjem',groups:'Grupper',chat:'Chat',profile:'Profil',post:'Legg ut',all:'Alle',needHelp:'🤝 Trenger hjelp',offer:'💼 Tilbyr',allPlaces:'🌐 Alle steder',posts:'Innlegg',friends:'Venner',active:'Aktive',completed:'Fullført',
  open:'Åpent',accepting:'Venter',pending:'Venter svar',activeSt:'Pågår',pendingReview:'Ferdigmeldt',done:'✅ Fullført',declined:'Avslått',neverDone:'❌ Aldri gjort',cancelled:'Kansellert',
  noPostsYet:'Ingen innlegg ennå.',writeToStart:'Skriv noe for å starte samtalen.',welcome:'Velkommen!',addFriend:'Legg til',search:'Søk',back:'Tilbake',save:'Lagre',cancel:'Avbryt',send:'Send',
  publish:'Publiser innlegget',myThings:'Mine ting',settings:'Innstillinger',reputation:'Rykte',shareApp:'Del appen med noen',noGroups:'Du har ingen grupper ennå.',createGroup:'Opprett en gruppe',
  lang:'Språk'},
en:{home:'Home',groups:'Groups',chat:'Chat',profile:'Profile',post:'Post',all:'All',needHelp:'🤝 Need help',offer:'💼 Offering',allPlaces:'🌐 All places',posts:'Posts',friends:'Friends',active:'Active',completed:'Completed',
  open:'Open',accepting:'Waiting',pending:'Pending',activeSt:'Active',pendingReview:'Review',done:'✅ Done',declined:'Declined',neverDone:'❌ Never done',cancelled:'Cancelled',
  noPostsYet:'No posts yet.',writeToStart:'Write something to start the conversation.',welcome:'Welcome!',addFriend:'Add',search:'Search',back:'Back',save:'Save',cancel:'Cancel',send:'Send',
  publish:'Publish',myThings:'My things',settings:'Settings',reputation:'Reputation',shareApp:'Share app',noGroups:'No groups yet.',createGroup:'Create a group',
  lang:'Language'}};
const t=k=>(((ls('oLang')||'no')==='en'?T.en:T.no)[k])||k;

// ═══ INDEXEDDB ═══
let db=null;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('optou',2);
  r.onupgradeneeded=e=>{const d=e.target.result;
    ['jobs','openJobs','contacts','ratings','jobChats','dms','images','offlineQ','relayQ','activity','groups','config'].forEach(n=>{if(!d.objectStoreNames.contains(n))d.createObjectStore(n);});};
  r.onsuccess=e=>{db=e.target.result;res(db);};r.onerror=e=>rej(e);});}
function dbGet(store,key){return new Promise((res,rej)=>{if(!db)return res(null);const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>res(null);});}
function dbPut(store,key,val){return new Promise((res,rej)=>{if(!db)return res();const tx=db.transaction(store,'readwrite');tx.objectStore(store).put(val,key);tx.oncomplete=()=>res();tx.onerror=()=>res();});}
function dbGetAll(store){return new Promise((res,rej)=>{if(!db)return res({});const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).getAll();const rk=tx.objectStore(store).getAllKeys();const result={};rk.onsuccess=()=>{r.onsuccess=()=>{rk.result.forEach((k,i)=>result[k]=r.result[i]);res(result);};};rk.onerror=()=>res({});});}
function dbDel(store,key){return new Promise(res=>{if(!db)return res();const tx=db.transaction(store,'readwrite');tx.objectStore(store).delete(key);tx.oncomplete=()=>res();tx.onerror=()=>res();});}

// ═══ STATE ═══
const A={myId:'',myName:'',myBio:'',myCity:'',myFylke:'',myBy:'',pubB64:'',privKey:null,pubKey:null,ecdhPriv:null,ecdhPubB64:'',ecdhSig:'',sharedKeys:new Map(),
  peer:null,ready:false,conns:new Map(),peers:new Map(),seen:new Set(),openJobs:new Map(),myJobs:[],jobChats:{},dms:{},
  contacts:[],blocked:new Set(),ratings:{},activity:[],offlineQ:[],relayQ:[],completedCount:0,
  screen:'loading',params:{},nb:{},rated:new Set(),unreadChat:0,_seenMids:new Set(),_seenAcks:new Set(),groups:[],
  feedFilter:{type:'all',locs:[]},knownGroups:new Map()};

async function loadState(){
  A.myName=ls('oName')||'';A.myBio=ls('oBio')||'';A.myCity=ls('oCity')||'';A.myFylke=ls('oFylke')||'';A.myBy=ls('oBy')||'';
  if(!db){try{const fb=JSON.parse(ls('oFallback')||'{}');A.myJobs=fb.myJobs||[];A.contacts=fb.contacts||[];A.ratings=fb.ratings||{};
    A.openJobs=new Map(fb.openJobs||[]);}catch(e){}return;}
  A.myJobs=(await dbGet('config','myJobs'))||[];
  A.jobChats=(await dbGet('config','jobChats'))||{};
  A.dms=(await dbGet('config','dms'))||{};
  A.contacts=(await dbGet('config','contacts'))||[];
  A.blocked=new Set((await dbGet('config','blocked'))||[]);
  A.ratings=(await dbGet('config','ratings'))||{};
  A.activity=(await dbGet('config','activity'))||[];
  A.offlineQ=(await dbGet('config','offlineQ'))||[];
  A.relayQ=(await dbGet('config','relayQ'))||[];
  A.groups=(await dbGet('config','groups'))||[];
  const kg=(await dbGet('config','knownGroups'))||[];A.knownGroups=new Map(kg);
  A._seenMids=new Set((await dbGet('config','seenMids'))||[]);
  A._seenAcks=new Set((await dbGet('config','seenAcks'))||[]);
  A.completedCount=parseInt(ls('oDone')||'0');
  A.rated=new Set((await dbGet('config','rated'))||[]);
  const oj=(await dbGet('config','openJobs'))||[];
  A.openJobs=new Map(oj.filter(([,j])=>!j.expiresAt||j.expiresAt>now()));

  addRQ({mid,id:rid,to,from:A.myId,msg,ts,expiresAt:exp});
  A.conns.forEach((c,cid)=>{if(cid===to||cid===A.myId||!c.open||!A.contacts.find(x=>x.id===cid))return;
    try{c.send({t:'RR',mid,rid,to,msg,from:A.myId,originalFrom:A.myId,finalTo:to,ts,expiresAt:exp});}catch(e){}});persist();}
function addRQ(item){if(!item.id||!item.to||item.to===A.myId)return;const mid=item.mid||item.id;
  if(A.relayQ.find(r=>r.mid===mid))return;A.relayQ.push({mid,id:item.id,to:item.to,from:item.from,msg:item.msg,ts:item.ts||now(),expiresAt:item.expiresAt||(now()+RTTL),att:0,nextAt:0});
  if(A.relayQ.length>RMAX)A.relayQ.splice(0,A.relayQ.length-RMAX);}
function deliverR(pid){const c=A.conns.get(pid);if(!c?.open)return;const n=now();
  A.relayQ.forEach(i=>{if(i.to!==pid||i.expiresAt<=n||i.nextAt>n)return;
    try{c.send({t:'RR',mid:i.mid,rid:i.id,to:i.to,msg:i.msg,from:i.from,originalFrom:i.from,finalTo:i.to,ts:i.ts,expiresAt:i.expiresAt});
      i.att=(i.att||0)+1;i.nextAt=n+Math.min(i.att*3e4,18e5);}catch(e){}});}

function offerRH(hid){const c=A.conns.get(hid);if(!c?.open||!A.contacts.find(x=>x.id===hid))return;const n=now();
  A.relayQ.forEach(i=>{if(i.from!==A.myId||i.to===hid||i.expiresAt<=n)return;if(!i.fwd)i.fwd=[];if(i.fwd.includes(hid)||i.fwd.length>=2)return;
    try{c.send({t:'RR',mid:i.mid,rid:i.id,to:i.to,msg:i.msg,from:i.from,originalFrom:i.from,finalTo:i.to,ts:i.ts,expiresAt:i.expiresAt});
      i.fwd.push(hid);}catch(e){}});}
function syncP(id){const c=A.conns.get(id);if(!c?.open)return;
  // 1. Re-send open posts
  A.myJobs.filter(j=>j.status==='open'&&j.creatorId===A.myId).forEach(j=>{
    const ts={...j,imageData:null};try{c.send({t:'INV',job:{...ts,fromContact:true}});}catch(e){}});
  // 2. Re-send status for active/pending jobs involving this peer
  A.myJobs.forEach(j=>{
    // Re-send accept if I'm owner and peer is the helper
    if(j.creatorId===A.myId&&j.helperId===id&&j.status==='active')
      try{c.send({t:'JY',jid:j.id,name:A.myName});}catch(e){}
    // Re-send done confirmation if I confirmed but peer may have missed
    if(j.creatorId===A.myId&&j.helperId===id&&j.status==='done')
      try{c.send({t:'PC',jid:j.id});}catch(e){}
    // Re-send helper-done if I'm helper and owner is this peer
    if(j.isHelper&&j.creatorId===id&&j.status==='pending_review')
      try{c.send({t:'HC',jid:j.id});}catch(e){}
    // Send BS sync for shared jobs
    if(j.creatorId===id||j.helperId===id)
      try{c.send({t:'BS',jid:j.id,status:j.status,helperId:j.helperId,helperName:j.helperName});}catch(e){}
  });flushQ();deliverR(id);}

function onData(from,m){try{if(!m||A.blocked.has(from))return;
  if(m.t==='HI'){const ex=A.peers.get(from)||{};
    const needsV=m.epub&&m.pub&&m.esig;
    A.peers.set(from,{...ex,id:from,name:m.name,bio:m.bio,city:m.city,pub:m.pub,epub:needsV?ex.epub||null:m.epub,esig:m.esig,done:m.done||0,jobs:m.jobs||0,online:true,ts:m.ts,pr:m.pr,epubV:needsV?ex.epubV:undefined,gids:m.gids||[],fylke:m.fylke||'',by:m.by||'',avatar:m.avatar||ex.avatar||''});
    if(needsV)verifyECDHSig(m.pub,m.epub,m.esig).then(ok=>{const p=A.peers.get(from);if(p){p.epubV=ok;if(ok)p.epub=m.epub;else{console.warn('[SEC] Peer',from,'ECDH sig INVALID');p.epub=null;}}});
    if(m.cids?.includes(A.myId)&&!A.contacts.find(c=>c.id===from)){A.contacts.push({id:from,name:m.name||from.substr(0,12),alias:m.name||from.substr(0,12)});persist();}
    if(!ex.name){try{A.conns.get(from)?.send({t:'HI',...myPres()});}catch(e){}
      if(A.contacts.find(c=>c.id===from)){A.myJobs.filter(j=>j.status==='open'&&j.creatorId===A.myId).forEach(j=>{try{A.conns.get(from)?.send({t:'INV',job:{...j,imageData:null,fromContact:true}});}catch(e){}});}}
    // Group sync: exchange posts+metadata for shared groups
    if(m.gids?.length){const myGids=new Set(A.groups.map(g=>g.id));const shared=m.gids.filter(g=>myGids.has(g));
      if(shared.length){const gSet=new Set(shared);const cc=A.conns.get(from);if(cc?.open){let gc=0;
        A.myJobs.filter(j=>j.status==='open'&&j.creatorId===A.myId&&j.groupId&&gSet.has(j.groupId)).forEach(j=>{
          try{cc.send({t:'INV',job:{...j,imageData:null,fromContact:true}});}catch(e){}});
        A.openJobs.forEach(j=>{if(gc>=50)return;if(j.groupId&&gSet.has(j.groupId)&&(!j.expiresAt||j.expiresAt>now())){
          try{cc.send({t:'INV',job:{...j,imageData:null,fromContact:true}});gc++;}catch(e){}}});
        shared.forEach(gid=>{const g=A.groups.find(x=>x.id===gid);
          if(g?.name&&g.name!==gid)try{cc.send({t:'GM',gid,name:g.name,desc:g.desc||'',private:g.private||false});}catch(e){}});}}}
    flushQ();sR();return;}
  if(m.t==='GS'){if(A.seen.has(m.id))return;if(!chkRate(from))return;A.seen.add(m.id);
    if(A.seen.size>3e3){const it=A.seen.values();for(let i=0;i<300;i++)A.seen.delete(it.next().value);}
    const fwdGS=()=>{if(m.ttl>0){const f={...m,ttl:m.ttl-1};A.conns.forEach((c2,id)=>{if(c2.open&&id!==from)try{c2.send(f);}catch(e){}});}};
    if(m.sig&&m.pub){verifyGossipSig(m).then(ok=>{if(ok){applyG(m.p);fwdGS();}else console.warn('[SEC] Invalid gossip sig from',m.origin);});}
    else{applyG(m.p);fwdGS();}return;}
  handleD(from,m);}catch(e){console.error('[onData]',m?.t,e);}}
function applyG(p){if(!p)return;if(p.t==='TAKE'||p.t==='CANCEL'){A.openJobs.delete(p.jobId);sR();}
  if(p.t==='RAT'&&p.uid&&p.ratings){if(!A.ratings[p.uid])A.ratings[p.uid]=[];
    p.ratings.forEach(r=>{if(!A.ratings[p.uid].find(x=>x.jobId===r.jobId&&x.ts===r.ts))A.ratings[p.uid].push(r);});persist();}
  if(p.t==='POST'&&p.job?.id){if(!A.openJobs.has(p.job.id)&&!A.myJobs.find(j=>j.id===p.job.id)&&!A.blocked.has(p.job.creatorId)){
    A.openJobs.set(p.job.id,{...p.job,isFromContact:false,isPublic:true});sR();}}
  if(p.t==='GRP'&&p.group?.id&&/^g[a-zA-Z0-9]{1,20}$/.test(p.group.id)&&!p.group.private){A.knownGroups.set(p.group.id,p.group);}}

function handleD(from,m){try{switch(m.t){
  case 'INV':{if(!m.job?.id||!/^[a-zA-Z0-9_-]{1,50}$/.test(m.job.id)||!m.job.creatorId||!/^[a-zA-Z0-9_-]{1,50}$/.test(m.job.creatorId))break;
    if(A.myJobs.find(j=>j.id===m.job.id)||A.openJobs.has(m.job.id))break;
    if(A.blocked.has(m.job.creatorId)||(m.job.expiresAt&&m.job.expiresAt<=now()))break;
    if(m.job.groupId&&!A.groups.find(g=>g.id===m.job.groupId))break;
    A.openJobs.set(m.job.id,{...m.job,isFromContact:true});
    if(m.job.imageData)dbPut('images',m.job.id,m.job.imageData);
    if(!m.job.groupId&&!A.contacts.find(c=>c.id===m.job.creatorId))A.contacts.push({id:m.job.creatorId,name:m.job.creatorName||m.job.creatorId.substr(0,12),alias:m.job.creatorName});
    if(m.job.groupId&&m.job.groupName){const g=A.groups.find(x=>x.id===m.job.groupId);if(g&&(!g.name||g.name===g.id))g.name=m.job.groupName;}
    notify('📩 '+esc(m.job.creatorName),esc(m.job.title?.substr(0,40)),()=>go('jobDetail',{jobId:m.job.id}));
    A.unreadChat++;updateB();sR();break;}
  case 'JR':{const j=A.myJobs.find(x=>x.id===m.jid);if(j&&['open','accepting'].includes(j.status)){
    if(!j.interests)j.interests=[];if(!j.interests.find(x=>x.id===from))j.interests.push({id:from,name:m.name,msg:m.message||'',ts:now()});
    j.status='accepting';notify('⚡ '+esc(m.name),'Vil hjelpe!',()=>go('jobDetail',{jobId:m.jid}));A.unreadChat++;persist();}sR();break;}
  case 'JY':{const j=A.myJobs.find(x=>x.id===m.jid);if(j&&j.status==='pending'){j.helperId=from;j.helperName=m.name;j.status='active';
    notify('✅ Godkjent!',esc(m.name));persist();}sR();break;}
  case 'JN':{const j=A.myJobs.find(x=>x.id===m.jid);if(j?.isHelper)j.status='declined';persist();sR();break;}
  case 'HC':{const j=A.myJobs.find(x=>x.id===m.jid);if(j){j.helperDone=true;j.status='pending_review';
    notify('🔔 Ferdigmeldt!',esc(j.title?.substr(0,30)));persist();}sR();break;}
  case 'PC':{const j=A.myJobs.find(x=>x.id===m.jid);if(j&&j.status!=='done'){j.status='done';A.completedCount++;ss('oDone',A.completedCount);
    notify('🎉 Godkjent!','Fullført!');persist();}sR();break;}
  case 'NP':{const j=A.myJobs.find(x=>x.id===m.jid);if(!j)break;j.status='never_done';
    if(!A.ratings[A.myId])A.ratings[A.myId]=[];
    A.ratings[A.myId].push({score:1,comment:'Fullførte aldri.',jobId:m.jid,raterName:j.creatorName||'?',ts:now(),nd:true});
    gossip({t:'RAT',uid:A.myId,ratings:A.ratings[A.myId]});persist();sR();break;}
  case 'BM':{if(!m.jid||!m.text)break;if(m._mid){if(A._seenMids.has(m._mid))break;A._seenMids.add(m._mid);}
    addJMsg(m.jid,{from,name:m.name||'?',text:m.text,audioUrl:m.audioUrl||null,imageUrl:m.imageUrl||null,duration:m.duration||0,ts:m.ts||now()});
    if(m._mid)send(from,{t:'MA',_mid:m._mid});
    if(A.screen!=='jobChat'||A.params.jobId!==m.jid){notify('💬 '+(m.name||'?'),esc(m.text?.substr(0,40)),()=>go('jobChat',{jobId:m.jid}));A.unreadChat++;}
    persist();if(A.screen==='jobChat'&&A.params.jobId===m.jid)sR();break;}
  case 'DM':{if(m._mid){if(A._seenMids.has(m._mid))break;A._seenMids.add(m._mid);}
    if(m._mid)send(from,{t:'MA',_mid:m._mid});
    if(m.enc&&!m.audioUrl&&!m.imageUrl){decFrom(m.text,A.peers.get(from)?.epub).then(pt=>{addDM(from,{from,name:m.name,text:pt,ts:m.ts||now()});
      if(A.screen!=='dm'||A.params.peerId!==from){notify('✉️ '+esc(m.name),esc(pt?.substr?.(0,40)));A.unreadChat++;}persist();sR();});}
    else{addDM(from,{from,name:m.name,text:m.text,audioUrl:m.audioUrl||null,imageUrl:m.imageUrl||null,duration:m.duration||0,ts:m.ts||now()});
      if(A.screen!=='dm'||A.params.peerId!==from){notify('✉️ '+esc(m.name),esc(m.text?.substr?.(0,40)));A.unreadChat++;}persist();sR();}break;}
  case 'RR':{if(!m.to||!m.msg)break;
    if(m.to===A.myId){const rrFrom=m.originalFrom||m.from||from;const isDup=m.mid&&A._seenMids.has('r:'+m.mid);
      if(!isDup&&!A.blocked.has(rrFrom)){if(m.mid)A._seenMids.add('r:'+m.mid);handleD(rrFrom,m.msg);}
      if(m.mid){const ack={t:'RA',mid:m.mid,finalTo:A.myId};A.conns.forEach((c,cid)=>{if(c.open)try{c.send(ack);}catch(e){}});}break;}
    if(!A.contacts.find(c=>c.id===m.to))break;
    addRQ({mid:m.mid||m.rid,id:m.rid||uid(),to:m.to,msg:m.msg,from:m.originalFrom||from,ts:m.ts||now(),expiresAt:m.expiresAt||(now()+RTTL)});
    deliverR(m.to);qPersist();break;}
  case 'RA':{if(!m.mid)break;const ak='a:'+m.mid;if(A._seenAcks.has(ak))break;A._seenAcks.add(ak);
    if(A._seenAcks.size>500)A._seenAcks=new Set([...A._seenAcks].slice(-300));
    A.relayQ=A.relayQ.filter(r=>r.mid!==m.mid);A.offlineQ=A.offlineQ.filter(i=>i.mid!==m.mid);
    const origId=m.originalFrom;if(origId&&origId!==A.myId){const oc=A.conns.get(origId);if(oc?.open)try{oc.send({t:'RA',mid:m.mid,finalTo:m.finalTo,originalFrom:origId});}catch(e){}}
    persist();break;}
  case 'BS':{if(!m.jid)break;const j=A.myJobs.find(x=>x.id===m.jid);if(!j)break;
    // Status priority: done > pending_review > active > accepting > open
    const pri={open:0,accepting:1,pending:1,active:2,pending_review:3,done:4,cancelled:5,never_done:5,declined:5};
    const myP=pri[j.status]||0;const theirP=pri[m.status]||0;
    if(theirP>myP){j.status=m.status;if(m.helperId&&!j.helperId){j.helperId=m.helperId;j.helperName=m.helperName;}
      if(m.status==='done'){A.completedCount++;ss('oDone',A.completedCount);}persist();sR();}break;}
  case 'MA':{if(!m._mid)break;
    // Find message in jobChats or dms and mark as delivered
    var found=false;Object.values(A.jobChats).forEach(msgs=>{if(found)return;const msg=msgs.find(x=>x._mid===m._mid);if(msg){msg._status='delivered';found=true;}});
    if(!found)Object.values(A.dms).forEach(msgs=>{if(found)return;const msg=msgs.find(x=>x._mid===m._mid);if(msg){msg._status='delivered';found=true;}});
    if(found){persist();sR();}break;}
  case 'GM':{if(!m.gid||!m.name)break;const g=A.groups.find(x=>x.id===m.gid);
    if(g&&(!g.name||g.name===g.id)){g.name=m.name;if(m.desc)g.desc=m.desc;if(m.private===false)g.private=false;persist();sR();}break;}
}}catch(e){console.error('[handleD]',m?.t,e);}}

function notify(title,body,onClick){const area=$('ntf');if(!area)return;const d=document.createElement('div');d.className='noti';

  if(typeof Notification!=='undefined'&&Notification.permission==='granted'&&document.hidden){try{new Notification(title,{body:body||''});}catch(e){}}}

function vSetup(){const step=A.params.step||1;const sf=A.nb._sf||'';const komm=sf?FYLKER.find(f=>f.id===sf)?.kommuner||[]:[];

    <option value="">Velg fylke...</option>${FYLKER.map(f=>`<option value="${f.id}"${sf===f.id?' selected':''}>${esc(f.name)}</option>`).join('')}</select></div>

    ${A.nb._sb==='_annet'?`<input class="fi" style="margin-top:6px" id="sba" placeholder="Skriv kommune..." maxlength="30" value="${esc(A.nb._sba||'')}" oninput="A.nb._sba=this.value">`:''}

window.finishSetup=async()=>{

      const id='g'+ab64(h).replace(/[^a-zA-Z0-9]/g,'').substr(0,14);
      if(!A.groups.find(g=>g.id===id))A.groups.push({id,name:'Familien',desc:'Privat familiegruppe',creatorId:A.myId,createdTs:now(),isGroup:true,private:true});}
    else{const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(gn));

      if(!A.groups.find(g=>g.id===id))A.groups.push({id,name:gn,desc:'',creatorId:'',createdTs:now(),isGroup:true,private:false});}}
  if(wgn?.trim()){const raw=wgn.trim()+A.myId;const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(raw));
    const id='g'+ab64(h).replace(/[^a-zA-Z0-9]/g,'').substr(0,14);
    if(!A.groups.find(g=>g.id===id))A.groups.push({id,name:wgn.trim(),desc:'Jobbgruppe',creatorId:A.myId,createdTs:now(),isGroup:true,private:true});}

function vFeed(){const oF=A.contacts.filter(c=>A.conns.get(c.id)?.open).length;

  let jobs=[...A.openJobs.values()].filter(j=>(!j.expiresAt||j.expiresAt>now())&&j.visibility!=='direct'&&(cIds.has(j.creatorId)||j.isFromContact||j.isPublic||(j.groupId&&gids.has(j.groupId))));
  const ff=A.feedFilter;
  if(ff.type!=='all')jobs=jobs.filter(j=>j.type===ff.type);
  if(ff.locs?.length)jobs=jobs.filter(j=>ff.locs.includes(j.by)||ff.locs.includes(j.fylke));
  // Sort: private group posts first, then open group, then rest, within each by time
  const gPriv=new Set(A.groups.filter(g=>g.private).map(g=>g.id));
  const gPub=new Set(A.groups.filter(g=>!g.private).map(g=>g.id));
  jobs.sort((a,b)=>{const ap=a.groupId&&gPriv.has(a.groupId)?0:a.groupId&&gPub.has(a.groupId)?1:2;
    const bp=b.groupId&&gPriv.has(b.groupId)?0:b.groupId&&gPub.has(b.groupId)?1:2;
    return ap!==bp?ap-bp:b.ts-a.ts;});
  const ic=A.myJobs.filter(j=>j.status==='accepting').length;const noC=!A.contacts.length;

  A.peers.forEach((p,pid)=>{if(A.contacts.find(c=>c.id===pid)||pid===A.myId||!p.name)return;

    const sharedG=(p.gids||[]).filter(g=>myOG.has(g)).length;const sameFylke=p.fylke&&p.fylke===A.myFylke?1:0;
    const score=mutual*3+sharedG*2+sameFylke;if(score>0)sugMap.set(pid,{name:p.name,score,mutual,sharedG});});
  const suggestions=[...sugMap.entries()].sort((a,b)=>b[1].score-a[1].score).slice(0,5);

      `<div class="fc${ff.type===v?' act':''}" onclick="A.feedFilter.type='${v}';render()">${l}</div>`).join('')}</div>
    ${A.myFylke?`<div class="flt"><div class="fc${!ff.locs?.length?' act':''}" onclick="A.feedFilter.locs=[];render()">🌐 Alle steder</div>
      ${(FYLKER.find(f=>f.id===A.myFylke)?.kommuner||[]).map(k=>
        `<div class="fc${(ff.locs||[]).includes(k)?' act':''}" onclick="var l=A.feedFilter.locs||[];var i=l.indexOf('${escA(k)}');if(i>=0)l.splice(i,1);else l.push('${escA(k)}');A.feedFilter.locs=l;render()">📍 ${esc(k)}</div>`).join('')}</div>`:''}
    ${ic?`<div class="cd cdt" onclick="go('mine')" style="background:var(--yb);border-color:#FDE68A"><div style="display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:700;color:#92400E">⚡ ${ic} vil hjelpe!<span>→</span></div></div>`:''}
    ${suggestions.length?`<div class="slbl">Folk du kanskje kjenner</div><div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;-webkit-overflow-scrolling:touch">${suggestions.map(([id,{name}])=>

        <button style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700" onclick="A.nb.imageData=null;render()">✕</button></div>`:

      `<button style="flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;border:1.5px solid ${A.nb.expiry==d?'var(--pr)':'var(--s3)'};background:${A.nb.expiry==d?'var(--pb)':'var(--sf)'};color:${A.nb.expiry==d?'var(--pr)':'var(--t2)'}" onclick="A.nb.expiry=${d};render()">${l}</button>`).join('')}</div></div>

window.handleImg=async inp=>{if(!inp.files[0])return;try{A.nb.imageData=await compressImage(inp.files[0]);render();}catch(e){notify('⚠️','Kunne ikke laste bilde');}};
window.doPost=async()=>{if(window._postBusy)return;const t=A.nb.title?.trim();if(!t){notify('⚠️','Skriv en tittel');return;}if(!A.nb.desc?.trim()){notify('⚠️','Skriv en beskrivelse');return;}
  if(A.nb.vis==='group'&&!A.nb.groupId){notify('⚠️','Velg en gruppe');return;}
  if(A.nb.vis==='direct'&&!(A.nb.targetIds||[]).length){notify('⚠️','Velg minst én person');return;}
  if(!A.nb.expiry)A.nb.expiry=7;window._postBusy=true;
  try{const jobId='j'+now().toString(36)+Math.random().toString(36).substr(2,4);
  let imageUrl=null;
  // Upload to Firebase if available, otherwise keep inline
  if(A.nb.imageData&&hasFB()){
    notify('📤','Laster opp bilde...');
    imageUrl=await fbUpload(A.nb.imageData,'posts/'+jobId+'.webp');
  }
  // Upload audio for items
  const items=(A.nb.items||[]).filter(it=>it.text.trim()||it.audioData||it.audioUrl);
  for(let i=0;i<items.length;i++){if(items[i].audioData&&hasFB()){
    const aUrl=await fbUpload(items[i].audioData,'audio/'+jobId+'_'+i+'.webm');if(aUrl){items[i].audioUrl=aUrl;items[i].audioData=null;}}}
  const job={id:jobId,type:A.nb.type||'help',title:t,desc:A.nb.desc.trim(),items:items.map(it=>({text:it.text.trim(),audioUrl:it.audioUrl||it.audioData||null,duration:it.duration||0})),
    reward:A.nb.reward||'',location:A.nb.location||'',fylke:A.nb.fylke||A.myFylke||'',by:A.nb.by||A.myBy||'',
    imageData:imageUrl?null:A.nb.imageData||null, // Inline only if no Firebase
    imageUrl:imageUrl||null, // Firebase URL
    groupId:A.nb.groupId||null,groupName:A.nb.groupName||null,
    visibility:A.nb.vis||((A.nb.type||'help')==='help'?'friends':'public'),targetIds:A.nb.targetIds||[],
    creatorId:A.myId,creatorName:A.myName,ts:now(),expiresAt:now()+A.nb.expiry*864e5,status:'open',interests:[]};
  A.myJobs.push({...job});
  if(A.nb.imageData)dbPut('images',jobId,A.nb.imageData);
  const toSend={...job};delete toSend.imageData;
  // Route based on visibility
  if(job.visibility==='direct'){(job.targetIds||[]).forEach(id=>send(id,{t:'INV',job:{...toSend,fromContact:true}}));}
  else if(job.visibility==='group'){const gid=job.groupId;A.contacts.forEach(c=>{const p=A.peers.get(c.id);if(!gid||p?.gids?.includes(gid))send(c.id,{t:'INV',job:{...toSend,fromContact:true}});});}
  else if(job.visibility==='public'){A.contacts.forEach(c=>send(c.id,{t:'INV',job:{...toSend,fromContact:true}}));
    gossip({t:'POST',job:{...toSend,fromContact:false}});}
  else{A.contacts.forEach(c=>send(c.id,{t:'INV',job:{...toSend,fromContact:true}}));}
  addAct('Nytt: '+t.substr(0,30),'📋');persist();A.nb={};go(job.visibility==='direct'?'chatHub':'mine');
  }finally{window._postBusy=false;}};

  ${[['Lagt ut av',esc(j.creatorName)+(pr?' · ⭐'+pr:'')],j.reward?['Tilbud',esc(j.reward)]:null,j.by||j.fylke||j.location?['Sted','📍 '+esc([j.by,FYLKER.find(f=>f.id===j.fylke)?.name,j.location].filter(Boolean).join(', '))]:null,j.groupName?['Gruppe','🏘️ '+esc(j.groupName)]:null,
  j.helperName?['Hjelper',esc(j.helperName)]:null,['Status',esc({open:'Åpent',accepting:'Venter',pending:'Venter svar',active:'Pågår',pending_review:'Ferdigmeldt',done:'✅ Fullført',declined:'Avslått',never_done:'❌ Aldri gjort',cancelled:'Kansellert'}[j.status]||j.status)]
  ].filter(Boolean).map(([k,v])=>`<div class="drow"><span>${k}</span><span class="dval">${v}</span></div>`).join('')}</div>`;

  if(isO&&['open','accepting'].includes(j.status))b+=`<button class="btn br" style="margin-bottom:10px" onclick="showConfirm('Kansellere?','Vil du kansellere innlegget?','Ja, kanseller',()=>{var x=A.myJobs.find(z=>z.id==='${escA(j.id)}');if(x){x.status='cancelled';A.openJobs.delete('${escA(j.id)}');gossip({t:'CANCEL',jobId:'${escA(j.id)}'});(x.interests||[]).forEach(p=>send(p.id,{t:'JN',jid:'${escA(j.id)}'}));}persist();render();})">🗑 Kanseller</button>`;
  if(isH&&j.status==='active')b+=`<div class="cd" style="border-color:var(--pbb);background:var(--pb)"><div style="font-size:14px;font-weight:700;color:var(--pr);margin-bottom:8px">Er du ferdig?</div>
    <button class="btn bg" onclick="var x=A.myJobs.find(z=>z.id==='${escA(j.id)}');if(x){x.status='pending_review';send(x.creatorId,{t:'HC',jid:'${escA(j.id)}'});persist();render();}">✅ Marker som ferdig</button></div>`;
  if(isO&&j.status==='active')b+=`<button class="btn br" style="margin-bottom:10px" onclick="showConfirm('Aldri gjort opp?','Er du sikker? Dette gir personen et permanent merke som alle kan se.','Ja, merk som aldri gjort',()=>{var x=A.myJobs.find(z=>z.id==='${escA(j.id)}');if(x){x.status='never_done';send(x.helperId,{t:'NP',jid:'${escA(j.id)}'});if(!A.ratings[x.helperId])A.ratings[x.helperId]=[];A.ratings[x.helperId].push({score:1,comment:'Aldri gjort opp.',jobId:'${escA(j.id)}',raterName:A.myName,ts:now(),nd:true});gossip({t:'RAT',uid:x.helperId,ratings:A.ratings[x.helperId]});}persist();render();})">⚠️ Aldri gjort opp</button>`;
  if(isO&&j.status==='active')b+=`<button class="btn bs" style="margin-bottom:10px" onclick="go('jobChat',{jobId:'${escA(j.id)}'})">💬 Åpne chat</button>`;

      <textarea class="fi" id="rc" rows="2" placeholder="Kommentar..." style="margin:8px 0" oninput="A.nb._rc=this.value"></textarea>

function vMine(){const posted=A.myJobs.filter(j=>j.creatorId===A.myId&&['open','accepting','active','pending_review'].includes(j.status));

  const mc=j=>{const isO=j.creatorId===A.myId;const[lbl,cls]=sm[j.status]||['—','bgr'];const sD=['done','declined','never_done','cancelled'].includes(j.status);

  return`<div class="scr"><div class="tbar"><button class="bk" onclick="go('profile')">Tilbake</button><div class="pgt">Mine ting</div><div style="font-weight:800;color:var(--g2);font-size:13px">${A.completedCount} fullført</div></div>

function vSearch(){const q=(A.params.q||'').toLowerCase();const myGids=new Set(A.groups.filter(g=>!g.private).map(g=>g.id));
  let results=[];A.peers.forEach((p,pid)=>{if(pid===A.myId||A.blocked.has(pid)||!p.name)return;
    if(q&&!p.name.toLowerCase().includes(q)&&!(p.by||'').toLowerCase().includes(q)&&!(p.fylke||'').toLowerCase().includes(q))return;
    const mutual=A.contacts.filter(c=>{const pp=A.peers.get(c.id);return pp?.cids?.includes(pid);}).length;
    const sharedG=(p.gids||[]).filter(g=>myGids.has(g)).length;const sameFylke=p.fylke&&p.fylke===A.myFylke?1:0;
    results.push({...p,id:pid,mutual,sharedG,sameFylke,score:mutual*3+sharedG*2+sameFylke});});
  results.sort((a,b)=>b.score-a.score);results=results.slice(0,50);
  return`<div class="scr"><div class="tbar"><button class="bk" onclick="go('contacts')">Tilbake</button><div class="pgt">Søk</div></div>
  <div class="fld"><input class="fi" id="sq" placeholder="Søk på navn, kommune eller fylke..." value="${esc(q)}" oninput="A.params.q=this.value;render()"></div>
  ${!results.length?'<div class="emp"><div class="emp-i">🔍</div><div class="emp-t">Ingen folk funnet i nettverket ennå.</div></div>':''}
  ${results.map(p=>{const pr=avgR(p.id);const fNm=p.fylke?FYLKER.find(f=>f.id===p.fylke)?.name:'';const isFr=A.contacts.find(c=>c.id===p.id);
    return`<div class="cd" style="padding:12px;margin-bottom:8px"><div style="display:flex;align-items:center;gap:10px">
    ${avHtml(p.id,p.name,36)}<div style="flex:1"><div style="font-size:14px;font-weight:600">${esc(p.name)}</div>
    <div style="font-size:11px;color:var(--t3)">${[p.by,fNm].filter(Boolean).map(x=>esc(x)).join(', ')}${pr?' · ⭐'+pr:''}${p.mutual?' · '+p.mutual+' felles venner':''}${p.sharedG?' · '+p.sharedG+' felles grupper':''}</div></div>
    ${!isFr?`<button class="btn bp bsm" style="width:auto;padding:6px 12px" onclick="event.stopPropagation();addF('${escA(p.id)}','${escA(p.name)}')">+ Legg til</button>`
    :`<button class="btn bs bsm" style="width:auto;padding:6px 12px" onclick="event.stopPropagation();go('repProfile',{uid:'${escA(p.id)}',name:'${escA(p.name)}'})">Rykte</button>`}
    </div></div>`;}).join('')}</div>`;}
window.copyId=()=>{try{navigator.clipboard.writeText(A.myId).then(()=>notify('✅','Kopiert!')).catch(()=>notify('📋',A.myId));}catch(e){notify('📋',A.myId);}};
window.connectById=()=>{const inp=$('add-id');if(!inp)return;const id=inp.value.trim();
  if(id.startsWith('g')){if(!/^g[a-zA-Z0-9]{1,20}$/.test(id)){notify('⚠️','Ugyldig gruppe-ID');return;}
    if(A.groups.find(g=>g.id===id)){notify('⚠️','Allerede medlem');return;}
    A.groups.push({id,name:id,desc:'',creatorId:'',createdTs:now(),isGroup:true,private:true});
    persist();bcast({t:'HI',...myPres()});notify('✅','Ble med i gruppe!');inp.value='';render();return;}
  if(!id||!id.startsWith('o')||id.length<8){notify('⚠️','Ugyldig ID');return;}if(id===A.myId)return;tryC(id);
  if(!A.contacts.find(c=>c.id===id))A.contacts.push({id,name:id.substr(0,12),alias:id.substr(0,12)});
  persist();notify('✅','Koblet til!');inp.value='';render();};

window.doCreateGroup=async()=>{const n=$('gn')?.value?.trim();if(!n){notify('⚠️','Skriv et gruppenavn');return;}

  else{const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(n));id='g'+ab64(h).replace(/[^a-zA-Z0-9]/g,'').substr(0,14);}
  const desc=$('gd')?.value?.trim()||'';
  A.groups.push({id,name:n,desc,creatorId:A.myId,createdTs:now(),isGroup:true,private:priv});
  persist();bcast({t:'HI',...myPres()});
  if(!priv)gossip({t:'GRP',group:{id,name:n,desc,fylke:A.myFylke,memberCount:1,private:false}});

(function(){try{const sz=512,c=document.createElement('canvas');c.width=c.height=sz;const ctx=c.getContext('2d');
  ctx.fillStyle='#FF6B35';ctx.beginPath();ctx.arc(sz/2,sz/2,sz/2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold '+(sz*.5)+'px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('O',sz/2,sz*.52);
  const png=c.toDataURL('image/png');const al=document.createElement('link');al.rel='apple-touch-icon';al.href=png;document.head.appendChild(al);
  const manifest={name:'OptoU',short_name:'OptoU',start_url:'.',display:'standalone',background_color:'#FAF9F6',theme_color:'#FF6B35',
    icons:[{src:png,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};

  const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(bl);document.head.appendChild(ml);
}catch(e){}})();


// ═══ SERVICE WORKER ═══
(function(){if(!('serviceWorker' in navigator)||location.protocol==='file:')return;
  const CACHE='optou-'+V;
  const swCode=`const CACHE='${CACHE}';
self.addEventListener('install',()=>self.skipWaiting());
self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim())));
self.addEventListener('fetch',e=>{const url=e.request.url;if(url.includes('version.json')||url.includes('fonts.g')||url.includes('unpkg.com'))return;
  e.respondWith(caches.match(e.request).then(c=>{if(c)return c;return fetch(e.request).then(r=>{if(r&&r.status===200){const cl=r.clone();caches.open(CACHE).then(ca=>ca.put(e.request,cl));}return r;}).catch(()=>caches.match(e.request).then(c2=>c2||new Response('Offline',{status:503})));}));});`;
  try{const blob=new Blob([swCode],{type:'application/javascript'});const swUrl=URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl,{scope:location.href.replace(/[?#].*/,'').replace(/[^/]*$/,'')}).catch(e=>console.warn('[SW]',e));
  }catch(e){console.warn('[SW]',e);}
})();

  else{go(ls('oSeen')?'setup':'onboarding');ss('oSeen','1');}
  // Garbage collection (prevents Scuttlebutt bloat)
  setInterval(async()=>{
    A.openJobs.forEach((j,id)=>{if(j.expiresAt&&j.expiresAt<now())A.openJobs.delete(id);});
    A.relayQ=A.relayQ.filter(r=>r.expiresAt>now());
    await persist();sR();
  },3e5);
  // Foreground recovery
  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&A.myName){
    if(A.peer?.disconnected&&!A.peer.destroyed)try{A.peer.reconnect();}catch(e){}
    A.contacts.forEach(c=>tryC(c.id));flushQ();sR();
    setTimeout(()=>{A.contacts.forEach(c=>tryC(c.id));flushQ();},2e3);
    setTimeout(()=>{A.contacts.forEach(c=>tryC(c.id));A.conns.forEach((_,id)=>{deliverR(id);offerRH(id);syncP(id);});flushQ();sR();},5e3);
  }});
  // Periodic reconnect health check
  setInterval(()=>{if(A.myName&&A.peer&&!A.ready&&!A.peer.destroyed)schRec();},3e4);
}
boot();
