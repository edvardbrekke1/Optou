// ═══ REGRESSION NOTES / DO NOT BREAK ═══
// - Friend removal must be bilateral: local remove + UF message + _removedContacts on both sides
// - HI auto-add must check _removedContacts before adding peer back
// - Manual re-add (addF) clears _removedContacts for that peer
// - Terminal jobs (cancelled/done/declined/never_done) must NEVER re-appear via INV — _deadJobs blocks them
// - INV handler must block ALL jobs already in myJobs, not just active ones
// - syncP/HI/group-sync must NEVER resend from A.openJobs — Firestore is backbone for discovery
// - fsJoinGroup/fsLeaveGroup must handle missing Firestore docs (deleted groups)
// - joinKnownGroup must verify Firestore doc exists before local join
// - Deleted groups must be removed from A.groups AND A._publicGroups (via fsCleanupOrphanedGroups + dropMissingGroup)
// - Groups must hydrate creatorId, _members, imageUrl from Firestore at every join path
// - vGroupDetail must not assume current user is admin when creatorId is missing or empty
// - cancelMyJob must handle ghost-jobs in A.openJobs, not just A.myJobs
// - withdrawHelp must set terminal status + _deadJobs, not hard-delete from myJobs
// - updatePointStatus syncs via PU message to owner, not just BM text
// - Keep checkRules R65 meaningful — do not suppress without fixing source
// - Public post discovery must NOT use gossip POST — use direct INV to contacts + Firestore (fsWritePost + fsLoadPublicPosts)
// - Public group discovery must NOT use gossip GRP — use Firestore (fsWriteGroup + fsLoadPublicGroups)
// - Group deletion must NOT use gossip GDEL — use fsDeleteGroup + fsCleanupOrphanedGroups (every ~10 min) + dropMissingGroup
// - fsCleanupOrphanedGroups runs every 2nd sync round (~10 min) and uses dropMissingGroup for complete cleanup
// - HI must NOT do group post backfill or GM metadata exchange — Firestore handles group discovery
// - syncP must NOT resend INV for post discovery — it only does BS status sync for shared jobs
// - HI must NOT resend INV for personal post discovery on first contact — Firestore + doPost direct INV handle this
// - GM metadata handler removed — group metadata must come from Firestore (fsReadGroup), not P2P GM messages
// - HI payload must NOT send redundant city field — use by + fylke for location
// - HI periodic broadcast is 25s (not 12s) — discovery is handled by Firestore, HI is presence-only
// - HI payload must NOT send raw jobs count — imprecise and not needed for presence
// - knownGroups cache is removed — public group discovery/UI uses only _publicGroups from Firestore
// - syncP/BS must only sync active statuses (open/accepting/active/pending_review), never terminal
// - BS handler must no-op on same/lower priority status to avoid redundant persist/render on reconnect
// ═══════════════════════════════════════

async function gK(){const kp=await crypto.subtle.generateKey({name:'ECDSA',namedCurve:'P-256'},true,['sign','verify']);

  const pu=await crypto.subtle.exportKey('raw',kp.publicKey);A.pubB64=ab64(pu);ss('oPriv',ab64(pr));ss('oPub',ab64(pu));
  const h=await crypto.subtle.digest('SHA-256',pu);A.myId='o'+ab64(h).replace(/[^a-zA-Z0-9]/g,'').substr(0,14);}
async function gE(){const kp=await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-256'},true,['deriveKey']);

  ss('oEPriv',ab64(await crypto.subtle.exportKey('pkcs8',kp.privateKey)));ss('oEPub',A.ecdhPubB64);
  if(A.privKey){const sig=await crypto.subtle.sign({name:'ECDSA',hash:'SHA-256'},A.privKey,pu);A.ecdhSig=ab64(sig);ss('oESig',A.ecdhSig);}}

function tryC(id){if(!A.peer||A.peer.destroyed||id===A.myId||A.conns.get(id)?.open||A._pending.has(id)||A.conns.size>=MC||A.blocked.has(id)||!A.ready){
  if(D()&&id!==A.myId&&!A.conns.get(id)?.open&&!A._pending.has(id))console.log('[tryC] blocked',{id,notReady:!A.ready,maxConns:A.conns.size>=MC});return;}
  var isTemp=[...A.tempConns.values()].some(tc=>tc.peerId===id);
  if(!A.contacts.find(c=>c.id===id)&&!isTemp){if(D())console.log('[tryC] blocked — not contact or temp',{id});return;}
  // Deterministic direction: only the lower ID initiates (prevents dual-connect flapping)
  if(A.myId>id&&!A.conns.get(id)?.open){const p=A.peers.get(id);
    if(p&&p.online&&(now()-(p.ts||0))<30000){if(D())console.log('[tryC] skip — higher ID, waiting for them',{id});return;}}
  if(D())console.log('[-> tryC]',{id,isTemp});A._pending.add(id);
  setTimeout(()=>{if(A._pending.has(id)){A._pending.delete(id);if(D())console.log('[tryC] pending timeout cleared',{id});}},15000);
  try{setupC(A.peer.connect(id,{reliable:true,serialization:'json'}));}catch(e){A._pending.delete(id);}}
function setupC(c){
  c.on('open',()=>{A._pending.delete(c.peer);
    // Deterministic dedup: keep the connection from the LOWER peer ID
    const ex=A.conns.get(c.peer);if(ex&&ex!==c&&ex.open){
      const keepEx=(A.myId<c.peer);if(keepEx){try{c.close();}catch(e){}return;}
      else{try{ex.close();}catch(e){}A.conns.delete(c.peer);}}
    if(D())console.log('[CONN] open',c.peer,{conns:A.conns.size});
    A.conns.set(c.peer,c);c.send({t:'HI',...myPres()});syncP(c.peer);deliverR(c.peer);offerRH(c.peer);flushQ();sR();updateB();
    c._keepalive=setInterval(()=>{if(c.open)try{c.send({t:'PING'});}catch(e){}},25000);});
  c.on('data',m=>onData(c.peer,m));
  c.on('close',()=>{if(c._keepalive)clearInterval(c._keepalive);if(D())console.log('[CONN] close',c.peer);A._pending.delete(c.peer);A.conns.delete(c.peer);const p=A.peers.get(c.peer);if(p){if(p._ot)clearTimeout(p._ot);p._ot=setTimeout(()=>{if(!A.conns.get(c.peer)?.open){p.online=false;sR();}},8e3);}
    // Retry with backoff — max once per 10s per peer
    if(A.contacts.find(x=>x.id===c.peer)){const lr=A._lastRetry[c.peer]||0;if(now()-lr<10000)return;A._lastRetry[c.peer]=now();
      setTimeout(()=>tryC(c.peer),3000);setTimeout(()=>tryC(c.peer),10000);}});
  c.on('error',(err)=>{if(c._keepalive)clearInterval(c._keepalive);if(D())console.log('[CONN] error',c.peer,err?.type||err);A._pending.delete(c.peer);A.conns.delete(c.peer);});}
function send(id,msg){const c=A.conns.get(id);if(c?.open){try{if(D())console.log('[SEND] DIRECT',msg.t,{to:id,jid:msg.jid||msg.job?.id});c.send(msg);return;}catch(e){}}
  if(D())console.log('[SEND] QUEUED',msg.t,{to:id,jid:msg.jid||msg.job?.id,connOpen:!!c?.open,conns:A.conns.size});
  if(A.offlineQ.length>=100)A.offlineQ.shift();const mid=['INV','HC','PC','BM','DM','JR','JY','JN','RJ','JW'].includes(msg.t)?uid():null;
  A.offlineQ.push({to:id,msg,ts:now(),mid});persist();if(mid)relayM(id,msg,mid);tryC(id);}
function bcast(msg){var _bc=0;A.conns.forEach((c,id)=>{if(c.open&&id!==msg.from){try{c.send(msg);_bc++;}catch(e){}}});if(D())console.log('[bcast]',msg.t,{recipients:_bc});}
function gossip(p){if(D())console.log('[gossip]',{payloadType:p.t});const msg={t:'GS',id:uid(),ttl:6,from:A.myId,origin:A.myId,p};
  signData({id:msg.id,origin:msg.origin,p}).then(sig=>{msg.sig=sig;msg.pub=A.pubB64;A.seen.add(msg.id);applyG(p);bcast(msg);});}
function flushQ(){const keep=[];var flushed=0;A.offlineQ.forEach(i=>{if(now()-i.ts>6048e5)return;const c=A.conns.get(i.to);
  if(c?.open){try{c.send(i.msg);flushed++;if(D())console.log('[flushQ] sent',i.msg.t,{to:i.to,jid:i.msg.jid||i.msg.job?.id});}catch(e){keep.push(i);}}else{keep.push(i);tryC(i.to);}});
  if(D()&&flushed)console.log('[flushQ]',flushed,'msgs flushed,',keep.length,'still queued');A.offlineQ=keep;persist();}

function stripJobForSend(j){var out={...j,imageData:null};if(out.items)out.items=out.items.map(it=>({text:it.text,audioUrl:it.audioUrl||null,duration:it.duration||0,mode:it.mode||'list',status:it.status||'open'}));return out;}
// ═══ RELAY ═══
function relayM(to,msg,mid){if(D())console.log('[-> relayM]',{to,type:msg?.t,mid});if(!A.myId||!to||!msg)return;const rid=uid();const ts=now();const exp=ts+RTTL;
  addRQ({mid,id:rid,to,from:A.myId,msg,ts,expiresAt:exp});
  A.conns.forEach((c,cid)=>{if(cid===to||cid===A.myId||!c.open||!A.contacts.find(x=>x.id===cid))return;
    try{c.send({t:'RR',mid,rid,to,msg,from:A.myId,originalFrom:A.myId,finalTo:to,ts,expiresAt:exp});}catch(e){}});persist();}
function addRQ(item){if(!item.id||!item.to||item.to===A.myId)return;const mid=item.mid||item.id;
  if(A.relayQ.find(r=>r.mid===mid))return;A.relayQ.push({mid,id:item.id,to:item.to,from:item.from,msg:item.msg,ts:item.ts||now(),expiresAt:item.expiresAt||(now()+RTTL),att:0,nextAt:0});
  if(A.relayQ.length>RMAX)A.relayQ.splice(0,A.relayQ.length-RMAX);}
function deliverR(pid){const c=A.conns.get(pid);if(!c?.open)return;const n=now();var _dr=0;
  A.relayQ.forEach(i=>{if(i.to!==pid||i.expiresAt<=n||i.nextAt>n)return;_dr++;
    try{c.send({t:'RR',mid:i.mid,rid:i.id,to:i.to,msg:i.msg,from:i.from,originalFrom:i.from,finalTo:i.to,ts:i.ts,expiresAt:i.expiresAt});
      i.att=(i.att||0)+1;i.nextAt=n+Math.min(i.att*3e4,18e5);}catch(e){}});if(D()&&_dr)console.log('[deliverR]',{to:pid,delivered:_dr});}

function offerRH(hid){const c=A.conns.get(hid);if(!c?.open||!A.contacts.find(x=>x.id===hid))return;const n=now();
  A.relayQ.forEach(i=>{if(i.from!==A.myId||i.to===hid||i.expiresAt<=n)return;if(!i.fwd)i.fwd=[];if(i.fwd.includes(hid)||i.fwd.length>=2)return;
    try{c.send({t:'RR',mid:i.mid,rid:i.id,to:i.to,msg:i.msg,from:i.from,originalFrom:i.from,finalTo:i.to,ts:i.ts,expiresAt:i.expiresAt});
      i.fwd.push(hid);}catch(e){}});}
function syncP(id){const c=A.conns.get(id);if(!c?.open)return;
  const ls2=A._lastSync.get(id)||0;if(now()-ls2<3e4)return;A._lastSync.set(id,now());
  // INV resend removed — post discovery via doPost direct INV + HI first-contact INV + Firestore
  // BS sync only for active statuses — terminal statuses handled by dedicated messages + Firestore
  A.myJobs.forEach(j=>{
    if((j.creatorId===id||j.helperId===id)&&['open','accepting','active','pending_review'].includes(j.status)){
      if(D())console.log('[syncP] BS→',id,{jid:j.id,status:j.status,helperId:j.helperId,reason:j.creatorId===id?'creator':'helper'});
      try{c.send({t:'BS',jid:j.id,status:j.status,helperId:j.helperId,helperName:j.helperName});}catch(e){}}
  });flushQ();deliverR(id);}

function onData(from,m){try{if(!m||A.blocked.has(from))return;
  if(m.t==='PING')return;
  if(m.t==='HI'){const ex=A.peers.get(from)||{};
    const needsV=m.epub&&m.pub&&m.esig;
    A.peers.set(from,{...ex,id:from,name:m.name,bio:m.bio,pub:m.pub,epub:needsV?ex.epub||null:m.epub,esig:m.esig,done:m.done||0,online:true,ts:m.ts,pr:m.pr,epubV:needsV?ex.epubV:undefined,gids:m.gids||[],fylke:m.fylke||'',by:m.by||'',avatar:m.avatar||ex.avatar||''});
    if(needsV)verifyECDHSig(m.pub,m.epub,m.esig).then(ok=>{const p=A.peers.get(from);if(p){p.epubV=ok;if(ok)p.epub=m.epub;else{console.warn('[SEC] Peer',from,'ECDH sig INVALID');p.epub=null;}}});
    if(m.cids?.includes(A.myId)&&!A.contacts.find(c=>c.id===from)){
      if(A._removedContacts.has(from)){if(D())console.log('[HI] auto-add blocked — removedContacts',{from,name:m.name});}
      else{A.contacts.push({id:from,name:m.name||from.substr(0,12),alias:m.name||from.substr(0,12)});persist();}}
    if(m.name){const ec=A.contacts.find(c=>c.id===from);if(ec&&ec.name!==m.name&&(!ec.name||ec.name===from.substr(0,12)||ec.name.startsWith('o'))){ec.name=m.name;if(!ec.alias||ec.alias===ec.name||ec.alias.startsWith('o'))ec.alias=m.name;qPersist();}}
    if(!ex.name){try{A.conns.get(from)?.send({t:'HI',...myPres()});}catch(e){}
      // HI first-contact INV removed — post discovery via doPost direct INV + Firestore only
    }
    // HI group sync removed — group post discovery and metadata via Firestore only
    flushQ();
    // Only render if something visible changed
    if(!ex.name)sR();
    return;}
  if(m.t==='GS'){if(A.seen.has(m.id))return;if(!chkRate(from))return;A.seen.add(m.id);
    if(A.seen.size>3e3){const it=A.seen.values();for(let i=0;i<300;i++)A.seen.delete(it.next().value);}
    const fwdGS=()=>{if(m.ttl>0){const f={...m,ttl:m.ttl-1};A.conns.forEach((c2,id)=>{if(c2.open&&id!==from)try{c2.send(f);}catch(e){}});}};
    if(m.sig&&m.pub){verifyGossipSig(m).then(ok=>{if(ok){applyG(m.p);fwdGS();}else console.warn('[SEC] Invalid gossip sig from',m.origin);});}
    else{applyG(m.p);fwdGS();}return;}
  handleD(from,m);}catch(e){console.error('[onData]',m?.t,e);}}
function applyG(p){if(!p)return;if(p.t==='TAKE'||p.t==='CANCEL'){A.openJobs.delete(p.jobId);sR();}
  if(p.t==='RAT'&&p.uid&&p.ratings){if(!A.ratings[p.uid])A.ratings[p.uid]=[];
    p.ratings.forEach(r=>{if(!A.ratings[p.uid].find(x=>x.jobId===r.jobId&&x.ts===r.ts))A.ratings[p.uid].push(r);});persist();}
  // POST gossip removed — public post discovery via direct INV + Firestore only
  // GRP gossip removed — public group discovery via Firestore (fsLoadPublicGroups) only
  // GDEL gossip removed — deleted groups detected via fsCleanupOrphanedGroups + dropMissingGroup
}

function handleD(from,m){try{if(D()&&['HC','PC','JY','JR','NP','INV','GI','RJ','JW'].includes(m.t))console.log('[MSG]',m.t,{from,jid:m.jid||m.job?.id});switch(m.t){
  case 'INV':{if(!m.job?.id||!/^[a-zA-Z0-9_-]{1,50}$/.test(m.job.id)||!m.job.creatorId||!/^[a-zA-Z0-9_-]{1,50}$/.test(m.job.creatorId))break;
    if(A._deadJobs.has(m.job.id)){if(D())console.log('[INV] blocked — deadJobs',{jid:m.job.id});break;}
    var _exJob=A.myJobs.find(j=>j.id===m.job.id);
    if(_exJob){if(D())console.log('[INV] blocked — in myJobs',{jid:m.job.id,status:_exJob.status});break;}
    if(A.openJobs.has(m.job.id))break;
    if(A.blocked.has(m.job.creatorId)||(m.job.expiresAt&&m.job.expiresAt!==0&&m.job.expiresAt<=now()))break;
    if(m.job.groupId&&!A.groups.find(g=>g.id===m.job.groupId))break;
    const rj={...m.job,isFromContact:true};
    if(rj.imageData){dbPut('images',m.job.id,rj.imageData);rj.imageData=null;}
    if(rj.items)rj.items=rj.items.map(it=>({text:it.text,audioUrl:it.audioUrl,duration:it.duration,mode:it.mode||'list',status:it.status||'open'}));
    A.openJobs.set(m.job.id,rj);
    if(!m.job.groupId&&!A.contacts.find(c=>c.id===m.job.creatorId))A.contacts.push({id:m.job.creatorId,name:m.job.creatorName||m.job.creatorId.substr(0,12),alias:m.job.creatorName});
    if(m.job.groupId&&m.job.groupName){const g=A.groups.find(x=>x.id===m.job.groupId);if(g&&(!g.name||g.name===g.id||g.name==='Gruppe...'))g.name=m.job.groupName;}
    if(m.job.groupId){if(!(A.screen==='groupDetail'&&A.params.gid===m.job.groupId)&&A.screen!=='groups')A.unreadGroups++;
      if(!(A.screen==='groupDetail'&&A.params.gid===m.job.groupId))A._unreadGroupPosts[m.job.groupId]=(A._unreadGroupPosts[m.job.groupId]||0)+1;}
    else{if(A.screen!=='feed')A.unreadFeed++;}
    notify('📩 '+(m.job.creatorName||''),m.job.title?.substr(0,40),()=>go('jobDetail',{jobId:m.job.id}));
    updateB();sR();break;}
  case 'JR':{const j=A.myJobs.find(x=>x.id===m.jid);
    if(D())console.log('[JR] received',{from,jid:m.jid,jobFound:!!j,jobStatus:j?.status,alreadyInInterests:j?.interests?.some(x=>x.id===from)});
    if(!j){if(D())console.log('[JR] ignored — job not found',{jid:m.jid});break;}
    if(!['open','accepting'].includes(j.status)){if(D())console.log('[JR] ignored — wrong status',{jid:m.jid,status:j.status});break;}
    if(!j.interests)j.interests=[];if(!j.interests.find(x=>x.id===from))j.interests.push({id:from,name:m.name,msg:m.message||'',audioUrl:m.audioUrl||null,audioDur:m.audioDur||0,ts:now()});
    if(!A.contacts.find(c=>c.id===from))A.tempConns.set(m.jid,{peerId:from,name:m.name||'',ts:now()});
    j.status='accepting';fsUpdatePostStatus(m.jid,'accepting');if(D())console.log('[JR] accepted',{jid:m.jid,interests:j.interests.length,status:j.status});
    if(A.screen!=='mine')A.unreadActivity++;A._unreadJobs[m.jid]=(A._unreadJobs[m.jid]||0)+1;notify('⚡ '+(m.name||''),'Vil hjelpe!',()=>go('jobDetail',{jobId:m.jid}));persist();updateB();sR();break;}
  case 'JY':{const j=A.myJobs.find(x=>x.id===m.jid);
    if(D())console.log('[JY] received',{from,jid:m.jid,jobFound:!!j,jobStatus:j?.status});
    if(j&&j.status==='pending'){j.helperId=from;j.helperName=m.name;j.status='active';
    if(A.screen!=='mine')A.unreadActivity++;A._unreadJobs[m.jid]=(A._unreadJobs[m.jid]||0)+1;notify('✅ Godkjent!',m.name||'');persist();}updateB();sR();break;}
  case 'JN':{const j=A.myJobs.find(x=>x.id===m.jid);if(D())console.log('[JN] received',{from,jid:m.jid,jobFound:!!j,isHelper:j?.isHelper,status:j?.status});
    if(j?.isHelper){j.status='declined';if(A.screen!=='mine')A.unreadActivity++;A._unreadJobs[m.jid]=(A._unreadJobs[m.jid]||0)+1;}persist();updateB();sR();break;}
  case 'HC':{const j=A.myJobs.find(x=>x.id===m.jid);if(D())console.log('[HC] received',{from,jid:m.jid,jobFound:!!j,status:j?.status});
    if(j&&j.status==='active'){j.helperDone=true;j.status='pending_review';
    if(A.screen!=='mine')A.unreadActivity++;A._unreadJobs[m.jid]=(A._unreadJobs[m.jid]||0)+1;fsUpdatePostStatus(m.jid,'pending_review');notify('🔔 Ferdigmeldt!',j.title?.substr(0,30));persist();}updateB();sR();break;}
  case 'PC':{const j=A.myJobs.find(x=>x.id===m.jid);if(D())console.log('[PC] received',{from,jid:m.jid,jobFound:!!j,status:j?.status});
    if(j&&j.status!=='done'){j.status='done';A.completedCount++;ss('oDone',A.completedCount);
    if(A.screen!=='mine')A.unreadActivity++;A._unreadJobs[m.jid]=(A._unreadJobs[m.jid]||0)+1;notify('🎉 Godkjent!','Fullført!');persist();}updateB();sR();break;}
  case 'NP':{const j=A.myJobs.find(x=>x.id===m.jid);if(!j)break;j.status='never_done';fsUpdatePostStatus(m.jid,'never_done');
    if(!A.ratings[A.myId])A.ratings[A.myId]=[];
    A.ratings[A.myId].push({score:1,comment:'Fullførte aldri.',jobId:m.jid,raterName:j.creatorName||'?',ts:now(),nd:true});
    if(A.screen!=='mine')A.unreadActivity++;A._unreadJobs[m.jid]=(A._unreadJobs[m.jid]||0)+1;gossip({t:'RAT',uid:A.myId,ratings:A.ratings[A.myId]});persist();updateB();sR();break;}
  case 'BM':{if(!m.jid||!m.text)break;if(m._mid){if(A._seenMids.has(m._mid))break;A._seenMids.add(m._mid);}
    addJMsg(m.jid,{from,name:m.name||'?',text:m.text,audioUrl:m.audioUrl||null,imageUrl:m.imageUrl||null,duration:m.duration||0,ts:m.ts||now()});
    if(m._mid)send(from,{t:'MA',_mid:m._mid});
    if(!((A.screen==='jobDetail'||A.screen==='jobChat')&&A.params.jobId===m.jid)){A.unreadActivity++;A._unreadJobs[m.jid]=(A._unreadJobs[m.jid]||0)+1;notify('💬 '+(m.name||'?'),m.text?.substr(0,40),()=>go('jobDetail',{jobId:m.jid}));}
    persist();updateB();if((A.screen==='jobDetail'||A.screen==='jobChat')&&A.params.jobId===m.jid)sR();break;}
  case 'DM':{if(m._mid){if(A._seenMids.has(m._mid))break;A._seenMids.add(m._mid);}
    if(m._mid)send(from,{t:'MA',_mid:m._mid});
    if(m.enc&&!m.audioUrl&&!m.imageUrl){decFrom(m.text,A.peers.get(from)?.epub).then(pt=>{addDM(from,{from,name:m.name,text:pt,ts:m.ts||now()});
      if(A.screen!=='dm'||A.params.peerId!==from){notify('✉️ '+(m.name||''),pt?.substr?.(0,40));A.unreadChat++;A._unreadDMs[from]=(A._unreadDMs[from]||0)+1;}updateB();persist();sR();});}
    else{addDM(from,{from,name:m.name,text:m.text,audioUrl:m.audioUrl||null,imageUrl:m.imageUrl||null,duration:m.duration||0,ts:m.ts||now()});
      if(A.screen!=='dm'||A.params.peerId!==from){notify('✉️ '+(m.name||''),m.text?.substr?.(0,40));A.unreadChat++;A._unreadDMs[from]=(A._unreadDMs[from]||0)+1;}updateB();persist();sR();}break;}
  case 'RR':{if(!m.to||!m.msg)break;
    if(m.to===A.myId){const rrFrom=m.originalFrom||m.from||from;const isDup=m.mid&&A._seenMids.has('r:'+m.mid);
      if(!isDup&&!A.blocked.has(rrFrom)){if(m.mid)A._seenMids.add('r:'+m.mid);handleD(rrFrom,m.msg);}
      if(m.mid){const ack={t:'RA',mid:m.mid,finalTo:A.myId};A.conns.forEach((c,cid)=>{if(c.open)try{c.send(ack);}catch(e){}});}break;}
    if(!A.contacts.find(c=>c.id===m.to))break;
    addRQ({mid:m.mid||m.rid,id:m.rid||uid(),to:m.to,msg:m.msg,from:m.originalFrom||from,ts:m.ts||now(),expiresAt:m.expiresAt||(now()+RTTL)});
    deliverR(m.to);qPersist();break;}
  case 'RA':{if(!m.mid)break;const ak='a:'+m.mid;if(A._seenAcks.has(ak))break;A._seenAcks.add(ak);
    if(A._seenAcks.size>500)A._seenAcks=new Set([...A._seenAcks].slice(-300));
    A.relayQ=A.relayQ.filter(r=>r.mid!==m.mid);A.offlineQ=A.offlineQ.filter(i=>i.mid!==m.mid);
    const origId=m.originalFrom;if(origId&&origId!==A.myId){const oc=A.conns.get(origId);if(oc?.open)try{oc.send({t:'RA',mid:m.mid,finalTo:m.finalTo,originalFrom:origId});}catch(e){}}
    persist();break;}
  case 'BS':{if(!m.jid)break;const j=A.myJobs.find(x=>x.id===m.jid);if(!j){if(D())console.log('[BS] job not found',m.jid);break;}
    if(m.status==='pending'){if(D())console.log('[BS] REJECTED pending from',from,{jid:m.jid,myStatus:j.status});break;}
    const pri={open:0,accepting:1,active:2,pending_review:3,done:4,cancelled:5,never_done:5,declined:5};
    const myP=pri[j.status]||0;const theirP=pri[m.status]||0;
    // No-op: same or lower priority and no missing helper info to fill
    if(theirP<myP||(theirP===myP&&(j.helperId||!m.helperId))){if(D())console.log('[BS] no-op',{jid:m.jid,myStatus:j.status,theirStatus:m.status});break;}
    if(D())console.log('[BS] applying',{from,jid:m.jid,from:j.status,to:m.status,fillHelper:!!(m.helperId&&!j.helperId)});
    j.status=m.status;if(m.helperId&&!j.helperId){j.helperId=m.helperId;j.helperName=m.helperName;}
    if(m.status==='done'){A.completedCount++;ss('oDone',A.completedCount);}
    if(A.screen!=='mine')A.unreadActivity++;A._unreadJobs[m.jid]=(A._unreadJobs[m.jid]||0)+1;persist();updateB();sR();break;}
  case 'MA':{if(!m._mid)break;
    // Find message in jobChats or dms and mark as delivered
    var found=false;Object.values(A.jobChats).forEach(msgs=>{if(found)return;const msg=msgs.find(x=>x._mid===m._mid);if(msg){msg._status='delivered';found=true;}});
    if(!found)Object.values(A.dms).forEach(msgs=>{if(found)return;const msg=msgs.find(x=>x._mid===m._mid);if(msg){msg._status='delivered';found=true;}});
    if(found){persist();sR();}break;}
  case 'JW':{const j=A.myJobs.find(x=>x.id===m.jid);

    if(j.interests){const before=j.interests.length;j.interests=j.interests.filter(x=>x.id!==from);
      if(D())console.log('[JW] interest removed',{before,after:j.interests.length,statusWas:j.status});
      if(j.interests.length===0&&j.status==='accepting'){j.status='open';fsUpdatePostStatus(j.id,'open');if(D())console.log('[JW] status→open (no interests left)');}
      if(A.screen!=='mine')A.unreadActivity++;A._unreadJobs[m.jid]=(A._unreadJobs[m.jid]||0)+1;notify('↩️',dn(from)+' trakk seg');persist();updateB();sR();}else{if(D())console.log('[JW] no interests array on job');}break;}
  case 'RJ':{const j=A.myJobs.find(x=>x.id===m.jid);if(D())console.log('[RJ] received',{from,jid:m.jid,jobFound:!!j,status:j?.status});

  case 'PU':{if(!m.jid||m.idx==null||!m.status)break;

  case 'GI':{if(!m.gid||!m.gname)break;if(A.groups.find(g=>g.id===m.gid))break;
    if(A.screen!=='groups')A.unreadGroups++;A._unreadGroupPosts[m.gid]=(A._unreadGroupPosts[m.gid]||0)+1;updateB();
    showConfirm('🏘️ Gruppeinvitasjon',(m.fromName||'Noen')+' inviterer deg til gruppen "'+(m.gname||'')+'"','Bli med',async()=>{
      if(A.groups.find(g=>g.id===m.gid)){notify('ℹ️','Du er allerede med i denne gruppen');return;}
      var data=await fsReadGroup(m.gid);
      if(!data){if(D())console.log('[GI] FS doc missing',m.gid);notify('⚠️','Gruppen finnes ikke lenger');return;}
      A.groups.push({id:m.gid,name:data.name||m.gname,desc:data.desc||m.gdesc||'',creatorId:data.creatorId||'',createdTs:now(),isGroup:true,
        private:data.private!=null?data.private:(m.gprivate||false),_members:data.members||[],imageUrl:data.imageUrl||null});
      persist();bcast({t:'HI',...myPres()});
      var res=await fsJoinGroup(m.gid,A.myId);
      if(res.missing){dropMissingGroup(m.gid,'GI accept — fsJoin missing');notify('⚠️','Gruppen finnes ikke lenger');return;}
      if(D())console.log('[GI] joined',{gid:m.gid,name:data.name,creatorId:data.creatorId});
      notify('✅','Ble med i '+(data.name||m.gname||'gruppen')+'!');go('groupDetail',{gid:m.gid});});break;}
  // GM handler removed — group metadata comes from Firestore, not P2P
  case 'UF':{if(D())console.log('[UF] received unfriend from',from);
    A._removedContacts.add(from);A.contacts=A.contacts.filter(c=>c.id!==from);persist();sR();break;}
}}catch(e){console.error('[handleD]',m?.t,e);}}

function vFeed(){const oF=A.contacts.filter(c=>A.conns.get(c.id)?.open).length;
  const cIds=new Set(A.contacts.map(c=>c.id));const gids=new Set(A.groups.map(g=>g.id));
  let jobs=[...A.openJobs.values()].filter(j=>(!j.expiresAt||j.expiresAt===0||j.expiresAt>now())&&j.visibility!=='direct'&&!['cancelled','done','never_done'].includes(j.status)&&(cIds.has(j.creatorId)||j.isFromContact||j.isPublic||(j.groupId&&gids.has(j.groupId))));
  const ff=A.feedFilter;
  if(ff.type)jobs=jobs.filter(j=>j.type===ff.type);
  if(ff.locs?.length)jobs=jobs.filter(j=>ff.locs.includes(j.by)||ff.locs.includes(j.fylke));
  // Sort: private group posts first, then open group, then rest, within each by time

  const gPub=new Set(A.groups.filter(g=>!g.private).map(g=>g.id));
  jobs.sort((a,b)=>{const ap=a.groupId&&gPriv.has(a.groupId)?0:a.groupId&&gPub.has(a.groupId)?1:2;
    const bp=b.groupId&&gPriv.has(b.groupId)?0:b.groupId&&gPub.has(b.groupId)?1:2;

    </div>
    ${A.myFylke?`<div class="flt" style="margin-top:0"><div class="fc${!ff.locs?.length?' act':''}" style="padding:8px 16px;font-size:13px" onclick="A.feedFilter.locs=[];render()">🌐 Alle steder</div>
      ${(FYLKER.find(f=>f.id===A.myFylke)?.kommuner||[]).map(k=>
        `<div class="fc${(ff.locs||[]).includes(k)?' act':''}" style="padding:8px 16px;font-size:13px" onclick="var l=A.feedFilter.locs||[];var i=l.indexOf('${escA(k)}');if(i>=0)l.splice(i,1);else l.push('${escA(k)}');A.feedFilter.locs=l;render()">📍 ${esc(k)}</div>`).join('')}</div>`:''}
    ${ic?`<div class="cd cdt" onclick="go('mine')" style="background:var(--yb);border-color:#FDE68A"><div style="display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:700;color:#92400E">⚡ ${ic} vil hjelpe!<span>→</span></div></div>`:''}
    ${(()=>{if(!myAct.length)return'';
      const mSm={open:['Åpent','bg1'],accepting:['Noen vil hjelpe!','by1'],active:['Pågår','bb1']};
      return`<div class="slbl">DINE AKTIVE POSTER (${myAct.length})</div><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">${myAct.map(j=>{const[lbl,cls]=mSm[j.status]||['—','bgr'];

    ${suggestions.length?`<div class="slbl">Folk du kanskje kjenner</div><div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;-webkit-overflow-scrolling:touch">${suggestions.map(([id,{name}])=>

  if(A.nb.vis==='group'&&!A.nb.groupId){notify('⚠️','Velg en gruppe');return;}
  if(A.nb.vis==='direct'&&!(A.nb.targetIds||[]).length){notify('⚠️','Velg minst én person');return;}
  const vis=A.nb.vis||((A.nb.type||'help')==='help'?'friends':'public');
  if(D())console.log('[→ POST]',{type:A.nb.type,vis,title:t,hasImage:!!A.nb.imageData,items:(A.nb.items||[]).length,groupId:A.nb.groupId});
  const defExp=['public','friends'].includes(vis)?30:0;
  const expDays=A.nb.expiry!==undefined?A.nb.expiry:defExp;
  const expAt=expDays>0?now()+expDays*864e5:0;
  window._postBusy=true;
  try{const jobId='j'+now().toString(36)+Math.random().toString(36).substr(2,4);
  // Bake image-point markers into the image if present
  var hasImgPts=A.nb.imageData&&(A.nb.items||[]).some(it=>it.mode==='image'&&it._cx!=null);
  if(hasImgPts){try{A.nb.imageData=await new Promise((res,rej)=>{var img2=new Image();img2.onerror=()=>rej();img2.onload=()=>{
    var cv2=document.createElement('canvas');cv2.width=img2.naturalWidth;cv2.height=img2.naturalHeight;var cx2=cv2.getContext('2d');cx2.drawImage(img2,0,0);
    (A.nb.items||[]).forEach((it,i)=>{if(it.mode==='image'&&it._cx!=null&&it._cy!=null){
      var x=it._cx*cv2.width,y=it._cy*cv2.height,sz=Math.max(20,cv2.width*0.04);
      cx2.beginPath();cx2.arc(x,y,sz,0,Math.PI*2);cx2.fillStyle='#FF6B35';cx2.fill();cx2.strokeStyle='#fff';cx2.lineWidth=sz*0.15;cx2.stroke();
      cx2.fillStyle='#fff';cx2.font='bold '+Math.round(sz*1.1)+'px sans-serif';cx2.textAlign='center';cx2.textBaseline='middle';cx2.fillText(''+(i+1),x,y);}});
    res(cv2.toDataURL('image/webp',0.85));};img2.src=A.nb.imageData;});}catch(e){}}
  let imageUrl=null;
  // Upload to Firebase if available, otherwise keep inline
  if(A.nb.imageData&&hasFB()){
    notify('📤','Laster opp bilde...');
    imageUrl=await fbUpload(A.nb.imageData,'posts/'+jobId+'.webp');
  }
  if(D())console.log('[POST] imageUpload',{success:!!imageUrl,fallback:!imageUrl&&!!A.nb.imageData});
  // Upload audio for items
  const items=(A.nb.items||[]).filter(it=>it.text.trim()||it.audioData||it.audioUrl);
  var audioFailed=false;
  for(let i=0;i<items.length;i++){if(items[i].audioData){
    if(hasFB()){const aUrl=await fbUpload(items[i].audioData,'audio/'+jobId+'_'+i+_aExt);
      if(aUrl){items[i].audioUrl=aUrl;items[i].audioData=null;}else{audioFailed=true;}}
    else{audioFailed=true;}}}
  if(audioFailed)notify('⚠️','Noe lyd kunne ikke lastes opp. Andre vil ikke høre den.');
  if(D())console.log('[POST] audioUpload',{total:items.length,failed:audioFailed});
  const job={id:jobId,type:A.nb.type||'help',title:t,desc:A.nb.desc.trim(),items:items.map(it=>({text:it.text.trim(),audioUrl:it.audioUrl||null,audioData:it.audioUrl?null:(it.audioData||null),duration:it.duration||0,mode:it.mode||'list',status:it.status||'open'})),
    reward:A.nb.reward||'',location:A.nb.location||'',fylke:A.nb.fylke||A.myFylke||'',by:A.nb.by||A.myBy||'',
    imageData:imageUrl?null:A.nb.imageData||null, // Inline only if no Firebase
    imageUrl:imageUrl||null, // Firebase URL
    groupId:A.nb.groupId||null,groupName:A.nb.groupName||null,
    jobDate:A.nb.jobDate||null,jobTime:A.nb.jobTime||null,
    visibility:A.nb.vis||((A.nb.type||'help')==='help'?'friends':'public'),targetIds:A.nb.targetIds||[],
    creatorId:A.myId,creatorName:A.myName,ts:now(),expiresAt:expAt,status:'open',interests:[]};
  A.myJobs.push({...job});
  if(A.nb.imageData)dbPut('images',jobId,A.nb.imageData);
  const toSend=stripJobForSend(job);
  // Route based on visibility (P2P for speed, Firestore for reliability)
  if(job.visibility==='direct'){(job.targetIds||[]).forEach(id=>send(id,{t:'INV',job:{...toSend,fromContact:true}}));}
  else if(job.visibility==='group'){const gid=job.groupId;A.contacts.forEach(c=>{const p=A.peers.get(c.id);if(!gid||p?.gids?.includes(gid))send(c.id,{t:'INV',job:{...toSend,fromContact:true}});});}
  else if(job.visibility==='public'){A.contacts.forEach(c=>send(c.id,{t:'INV',job:{...toSend,fromContact:true}}));}
  else{A.contacts.forEach(c=>send(c.id,{t:'INV',job:{...toSend,fromContact:true}}));}
  // All posts go to Firestore (backbone for offline delivery)
  await fsWritePost(job);
  if(D())console.log('[POST] routing',{vis:job.visibility,fsWrite:true});
  if(D())console.log('[← POST] done',{jid:jobId});
  addAct('Nytt: '+t.substr(0,30),'📋');persist();A.nb={};go(job.visibility==='direct'?'chatHub':'mine');
  }finally{window._postBusy=false;}};

window.cancelMyJob=function(jobId){
  var x=A.myJobs.find(z=>z.id===jobId);
  if(D())console.log('[cancelMyJob]',{jobId,inMyJobs:!!x,inOpenJobs:A.openJobs.has(jobId),status:x?.status});
  // Ghost-job cleanup: job visible in vDetail via openJobs but not in myJobs
  if(!x){var gh=A.openJobs.get(jobId);
    if(gh){A._deadJobs.add(jobId);A.openJobs.delete(jobId);
      if(gh.creatorId===A.myId){fsDeletePost(jobId);notify('🧹','Fjernet gammel kopi');if(D())console.log('[cancelMyJob] ghost cleanup — own post',jobId);}
      else{notify('🧹','Skjulte gammel kopi');if(D())console.log('[cancelMyJob] ghost cleanup — other post',jobId);}
      persist();render();return;}
    notify('⚠️','Jobben ble ikke funnet');return;}
  if(x.creatorId!==A.myId){notify('⚠️','Du er ikke eier av denne jobben');return;}
  if(['cancelled','done','never_done','declined'].includes(x.status)){notify('ℹ️','Jobben er allerede avsluttet');return;}
  var _hid=x.helperId;
  x.status='cancelled';x.helperId=null;x.helperName=null;x.helperDone=false;
  A._deadJobs.add(jobId);A.openJobs.delete(jobId);
  gossip({t:'CANCEL',jobId});fsUpdatePostStatus(jobId,'cancelled');
  (x.interests||[]).forEach(p=>send(p.id,{t:'JN',jid:jobId}));
  if(_hid)send(_hid,{t:'BS',jid:jobId,status:'cancelled'});
  fsClearInterests(jobId);persist();render();};

window.updateAvatar=async inp=>{if(!inp.files[0])return;try{const d=await compressAvatar(inp.files[0]);
  if(hasFB()){const url=await fbUpload(d,'profiles/'+A.myId+'.webp');if(url){ss('oAvatar',url);notify('✅','Bilde oppdatert!');render();return;}}
  ss('oAvatar',d);notify('✅','Bilde oppdatert!');render();}catch(e){notify('⚠️','Kunne ikke laste bilde');}};
window.saveS=()=>{const n=$('stn')?.value?.trim();if(!n){notify('⚠️','Skriv et navn');return;}
  A.myName=n;A.myFylke=$('stf')?.value||'';A.myBy=$('stc')?.value?.trim()||'';A.myCity=A.myBy;A.myBio=$('stb')?.value?.trim()||'';
  ss('oName',A.myName);ss('oCity',A.myCity);ss('oBio',A.myBio);ss('oFylke',A.myFylke);ss('oBy',A.myBy);
  bcast({t:'HI',...myPres()});fsRegisterUser();notify('✅','Lagret!');go('profile');};

function countGM(gid){let c=0;A.peers.forEach(p=>{if(p.gids?.includes(gid)&&p.online)c++;});return c;}
window.copyGid=id=>{if(D())console.log('[copyGid]',id);try{navigator.clipboard.writeText(id).then(()=>notify('✅','Kopiert!')).catch(()=>notify('📋',id));}catch(e){notify('📋',id);}};
window.shareGroupLink=(gid,gname)=>{var text='Bli med i gruppen "'+(gname||'Gruppe')+'" på OptoU! Gruppekode: '+gid;
  if(navigator.share){navigator.share({title:'OptoU – '+(gname||'Gruppe'),text:text}).catch(()=>{});}
  else{try{navigator.clipboard.writeText(text).then(()=>notify('✅','Kopiert til utklippstavlen!')).catch(()=>notify('📋',text));}catch(e){notify('📋',text);}}};
window.handleGroupEditImg=async inp=>{if(!inp.files[0])return;try{A._pendingGroupImg=await compressImage(inp.files[0]);render();}catch(e){notify('⚠️','Kunne ikke laste bilde');}};
window.saveGroupEdit=async gid=>{if(D())console.log('[saveGroupEdit]',{gid});
  var g=A.groups.find(x=>x.id===gid);if(!g||g.creatorId!==A.myId)return;
  var desc=$('gedit-desc')?.value?.trim()||'';g.desc=desc;
  if(A._pendingGroupImg){var url=await fbUpload(A._pendingGroupImg,'groups/'+gid+'.webp');if(url)g.imageUrl=url;A._pendingGroupImg=null;}
  fsWriteGroup(gid,{desc:g.desc,imageUrl:g.imageUrl||null,updatedAt:Date.now()});
  A._editGroup=false;persist();notify('✅','Gruppe oppdatert!');render();};
window.inviteToGroup=(gid,gname,pid)=>{if(D())console.log('[inviteToGroup]',{gid,gname,pid});const g=A.groups.find(x=>x.id===gid);
  send(pid,{t:'GI',gid,gname,gdesc:g?.desc||'',gprivate:g?.private||false,fromName:A.myName});
  notify('✅','Invitasjon sendt!');};
window.joinKnownGroup=async id=>{if(D())console.log('[joinKnownGroup]',{id});if(!/^g[a-zA-Z0-9]{1,20}$/.test(id))return;
  if(A.groups.find(g=>g.id===id)){notify('⚠️','Allerede medlem');return;}
  // Verify group exists in Firestore before local join
  var data=await fsReadGroup(id);
  if(!data){if(D())console.log('[joinKnownGroup] FS doc missing, cleaning up',id);
    dropMissingGroup(id,'joinKnownGroup — doc missing');notify('⚠️','Gruppen finnes ikke lenger');return;}
  A.groups.push({id,name:data.name||'Gruppe...',desc:data.desc||'',creatorId:data.creatorId||'',createdTs:now(),isGroup:true,
    private:data.private||false,_members:data.members||[],imageUrl:data.imageUrl||null});
  persist();bcast({t:'HI',...myPres()});
  var res=await fsJoinGroup(id,A.myId);
  if(res.missing){if(D())console.log('[joinKnownGroup] fsJoin missing',id);dropMissingGroup(id,'joinKnownGroup — fsJoin missing');notify('⚠️','Gruppen finnes ikke lenger');return;}
  if(D())console.log('[joinKnownGroup] joined',{id,name:data.name,creatorId:data.creatorId,members:data.members?.length});
  notify('✅','Ble med i '+(data.name||'gruppen')+'!');go('groupDetail',{gid:id});};
window.joinGroup=async()=>{const inp=$('add-gid');if(!inp)return;const id=inp.value.trim();if(D())console.log('[joinGroup]',{id});
  if(!id||!/^g[a-zA-Z0-9]{1,20}$/.test(id)){notify('⚠️','Ugyldig gruppe-ID (starter med g)');return;}
  if(A.groups.find(g=>g.id===id)){notify('⚠️','Allerede medlem');return;}
  var data=await fsReadGroup(id);
  if(!data){if(D())console.log('[joinGroup] FS doc missing',id);notify('⚠️','Gruppen finnes ikke');return;}
  A.groups.push({id,name:data.name||'Gruppe...',desc:data.desc||'',creatorId:data.creatorId||'',createdTs:now(),isGroup:true,
    private:data.private||false,_members:data.members||[],imageUrl:data.imageUrl||null});
  persist();bcast({t:'HI',...myPres()});inp.value='';
  var res=await fsJoinGroup(id,A.myId);
  if(res.missing){dropMissingGroup(id,'joinGroup — fsJoin missing');notify('⚠️','Gruppen finnes ikke lenger');return;}
  if(D())console.log('[joinGroup] joined',{id,name:data.name,creatorId:data.creatorId});
  notify('✅','Ble med i '+(data.name||'gruppen')+'!');render();};
window.searchGroups=async q=>{const el=$('grp-search-results');if(!el)return;q=(q||'').trim().toLowerCase();
  if(q.length<2){el.innerHTML='';return;}if(!hasFS()){el.innerHTML='<div style="font-size:12px;color:var(--t3);padding:8px">Firestore ikke tilgjengelig.</div>';return;}
  try{const snap=await fbDb.collection('groups').where('nameLower','>=',q).where('nameLower','<=',q+'\uf8ff').where('private','==',false).limit(10).get();
    if(!snap.size){el.innerHTML='<div style="font-size:12px;color:var(--t3);padding:8px">Ingen grupper funnet.</div>';return;}
    const myGids=new Set(A.groups.map(g=>g.id));
    el.innerHTML=snap.docs.map(d=>{const g=d.data();const gid=d.id;const already=myGids.has(gid);
      return`<div class="cd" style="margin-bottom:8px;padding:10px 14px;display:flex;align-items:center;gap:10px">
      <div class="av" style="background:#F5F3FF;color:#7C3AED;border-color:#DDD6FE;width:32px;height:32px;font-size:12px">🔓</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">${esc(g.name||gid)}</div>
      <div style="font-size:11px;color:var(--t3)">${g.members?g.members.length:''} medlemmer</div></div>
      ${already?'<span class="badge bg1" style="font-size:11px">Medlem</span>':`<button class="btn bp bsm" style="width:auto;padding:6px 12px" onclick="joinKnownGroup('${escA(gid)}')">Bli med</button>`}</div>`;}).join('');
  }catch(e){console.warn('[searchGroups]',e);el.innerHTML='<div style="font-size:12px;color:var(--t3);padding:8px">Søk feilet.</div>';}};
window.deleteGroup=(gid)=>{if(D())console.log('[deleteGroup]',gid);
  A.groups=A.groups.filter(x=>x.id!==gid);
  A.openJobs.forEach((j,id)=>{if(j.groupId===gid)A.openJobs.delete(id);});
  A.myJobs=A.myJobs.filter(j=>j.groupId!==gid);
  fsDeleteGroup(gid);
  // GDEL gossip removed — other peers detect deletion via fsCleanupOrphanedGroups + dropMissingGroup
  persist();bcast({t:'HI',...myPres()});notify('🗑️','Gruppen er slettet');go('groups');};
window.doCreateGroup=async()=>{if(D())console.log('[-> doCreateGroup]');const n=$('gn')?.value?.trim();if(!n){notify('⚠️','Skriv et gruppenavn');return;}
  const priv=A.nb._gPriv!==false;
  let id;if(priv){const raw=n+now()+Math.random();const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(raw));id='g'+ab64(h).replace(/[^a-zA-Z0-9]/g,'').substr(0,14);}
  else{const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(n));id='g'+ab64(h).replace(/[^a-zA-Z0-9]/g,'').substr(0,14);}
  const desc=$('gd')?.value?.trim()||'';
  const fylke=A.nb._gFylke||A.myFylke||'';
  let imageUrl=null;
  if(A.nb._gImg&&hasFB()){try{imageUrl=await fbUpload(A.nb._gImg,'groups/'+id+'.webp');}catch(e){if(D())console.log('[doCreateGroup] img upload err',e.message);}}
  A.groups.push({id,name:n,desc,creatorId:A.myId,createdTs:now(),isGroup:true,private:priv,imageUrl,fylke});
  persist();bcast({t:'HI',...myPres()});
  // GRP gossip removed — public group discovery via Firestore (fsLoadPublicGroups) only
  fsWriteGroup(id,{name:n,nameLower:n.toLowerCase(),desc,private:priv,fylke,imageUrl:imageUrl||null,creatorId:A.myId,createdAt:Date.now(),members:[A.myId]});
  A.nb={};
  if(priv){go('groupCreated',{gid:id});}else{notify('✅','Gruppe opprettet!');go('groupDetail',{gid:id});}};
function vGroups(){
  return`<div class="scr"><div class="hdr"><div style="font-size:22px;font-weight:800">Grupper</div><button class="btn bs bsm" style="width:auto" onclick="go('createGroup')">+ Ny</button></div>

      <div style="flex:1"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:15px;font-weight:700">${esc(g.name||g.id)}</span><span style="font-size:12px">${g.private?'🔒':'🌐'}</span>${itemBadge(_gu)}</div>
      <div style="font-size:12px;color:var(--t3)">${mc} medlemmer · ${gp} innlegg</div></div></div></div>`;};
    const myGids=new Set(A.groups.map(g=>g.id));
    const explore=(A._publicGroups||[]).filter(g=>!myGids.has(g.id));
    return(priv.length?`<span class="slbl">🔒 PRIVATE</span>${priv.map(gc).join('')}`:'')

      +(explore.length?`<span class="slbl" style="margin-top:18px;display:block">🌍 UTFORSK GRUPPER</span>${explore.slice(0,10).map(eg=>
        `<div class="cd" style="margin-bottom:8px;padding:10px 14px;display:flex;align-items:center;gap:10px">
        ${eg.imageUrl?`<img src="${esc(eg.imageUrl)}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid var(--s3);flex-shrink:0">`
        :`<div style="width:36px;height:36px;border-radius:50%;background:#F5F3FF;border:1px solid #DDD6FE;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">🌐</div>`}
        <div style="flex:1"><div style="font-size:14px;font-weight:600">${esc(eg.name)}</div>

        <button class="btn bp bsm" style="width:auto;padding:6px 12px" onclick="joinKnownGroup('${escA(eg.id)}')">Bli med</button></div>`).join('')}`:'');})()}</div>`;}
function vGroupDetail(){const gid=A.params.gid;const g=A.groups.find(x=>x.id===gid);
  if(!g)return`<div class="scr"><div class="tbar"><button class="bk" onclick="go('groups')">Tilbake</button></div><div class="emp"><div class="emp-i">❓</div><div class="emp-t">Gruppe ikke funnet.</div></div></div>`;
  const isAdmin=!!(g.creatorId&&g.creatorId===A.myId);
  const onlineMembers=[];A.peers.forEach((p,pid)=>{if(p.gids?.includes(gid)&&pid!==A.myId)onlineMembers.push({...p,id:pid});});
  const totalMembers=(g._members||[]).length||onlineMembers.length+1;
  const onlineCount=onlineMembers.filter(p=>p.online).length;
  const adminName=isAdmin?'Du':g.creatorId?(()=>{const ap=A.peers.get(g.creatorId);return ap?.name||A.contacts.find(c=>c.id===g.creatorId)?.name||A._userNames[g.creatorId]||'';})():'';
  // Background hydration if creatorId missing
  if(!g.creatorId&&hasFS())fsReadGroup(gid).then(data=>{if(data&&data.creatorId){
    g.creatorId=data.creatorId;if(data.members)g._members=data.members;if(data.imageUrl)g.imageUrl=data.imageUrl;if(data.name&&g.name==='Gruppe...')g.name=data.name;
    if(D())console.log('[vGroupDetail] hydrated missing creatorId',{gid,creatorId:data.creatorId});persist();sR();}});
  // Combine posts from myJobs + openJobs, dedup, filter
  const seen=new Set();const allP=[];
  const _gterm=['cancelled','never_done','declined','done'];
  A.myJobs.filter(j=>j.groupId===gid&&!_gterm.includes(j.status)).forEach(j=>{if(!seen.has(j.id)){seen.add(j.id);allP.push(j);}});
  [...A.openJobs.values()].filter(j=>j.groupId===gid&&(!j.expiresAt||j.expiresAt===0||j.expiresAt>now())&&!_gterm.includes(j.status)).forEach(j=>{if(!seen.has(j.id)){seen.add(j.id);allP.push(j);}});
  allP.sort((a,b)=>b.ts-a.ts);
  if(D())console.log('[vGroupDetail]',{gid,posts:allP.length});
  return`<div class="scr"><div class="tbar"><button class="bk" onclick="go('groups')">Tilbake</button><div class="pgt">${esc(g.name||g.id)}</div></div>
  <div class="cd" style="margin-bottom:12px"><span class="badge ${g.private?'bgr':'bg1'}" style="margin-bottom:8px">${g.private?'🔒 Privat':'🔓 Åpen'}</span>
  ${g.desc?`<div style="font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:8px">${esc(g.desc)}</div>`:''}
  <div style="font-size:13px;color:var(--t2);margin-bottom:4px">👥 ${totalMembers} medlemmer${onlineCount?' · 🟢 '+onlineCount+' online':''}</div>
  ${adminName?`<div style="font-size:12px;color:var(--t3);margin-bottom:8px">👑 Admin: ${esc(adminName)}</div>`:''}

async function boot(){
  if(D())console.log('[-> boot] phase:start');
  fetch('https://'+PEER_CONFIG.host).catch(()=>{});// Wake Render early
  try{await openDB();if(D())console.log('[boot] phase:db-open');}catch(e){console.warn('[DB] IndexedDB unavailable, using fallback');}
  await loadState();if(D())console.log('[boot] phase:state-loaded');
  initFB();if(D())console.log('[boot] phase:firebase-init');
  if(typeof Notification!=='undefined'&&Notification.permission==='default')try{Notification.requestPermission();}catch(e){}
  if(A.myName){if(D())console.log('[boot] phase:crypto');try{await initCrypto();}catch(e){console.error(e);}
    // Migration: fix jobs corrupted by old BS bug (owner's status overwritten to 'pending')
    var _migrated=0;A.myJobs.forEach(j=>{if(j.creatorId===A.myId&&j.status==='pending'){j.status='open';_migrated++;}});
    if(_migrated){console.log('[MIGRATE] Fixed',_migrated,'owner jobs from pending→open');persist();}
    // Migration: remove orphaned done jobs without helperId (corrupt from old sync bug)
    var _orphaned=0;A.myJobs=A.myJobs.filter(j=>{if(j.status==='done'&&!j.helperId&&!j.isHelper){_orphaned++;fsDeletePost(j.id);return false;}return true;});
    if(_orphaned){console.log('[MIGRATE] Removed',_orphaned,'orphaned done jobs');persist();}
    // Migration: ensure all groups have creatorId
    A.groups.forEach(g=>{if(!g.creatorId){g.creatorId=A.myId;}});
    // Migration: fix cancelled jobs with helperId
    A.myJobs.forEach(j=>{if(j.status==='cancelled'&&j.helperId){j.helperId=null;j.helperName=null;j.helperDone=false;}});
    // Migration: clean orphaned jobChats
    var _chatCleaned=0;Object.keys(A.jobChats).forEach(k=>{if(!A.myJobs.find(j=>j.id===k)){delete A.jobChats[k];_chatCleaned++;}});
    if(_chatCleaned){console.log('[MIGRATE] Cleaned',_chatCleaned,'orphaned jobChats');persist();}
    if(D())console.log('[boot] phase:peer');initPeer();$('nav').style.display='block';go('feed');
    if(D())console.log('[boot] phase:firestore-sync');fsRegisterUser();
    // Background: load discoverable posts from Firestore
    fsLoadPublicPosts().then(posts=>{var added=0;posts.forEach(p=>{if(!A.openJobs.has(p.id)&&!A.myJobs.find(j=>j.id===p.id)&&!A.blocked.has(p.creatorId)){A.openJobs.set(p.id,{...p,isFromContact:false,isPublic:true});added++;}});if(added>0){persist();sR();}if(D())console.log('[FS] loaded',added,'public posts');});
    fsLoadFriendsPosts().then(posts=>{var added=0;posts.forEach(p=>{if(!A.openJobs.has(p.id)&&!A.myJobs.find(j=>j.id===p.id)&&!A.blocked.has(p.creatorId)){A.openJobs.set(p.id,{...p,isFromContact:true,isPublic:false});added++;}});if(added>0){persist();sR();}if(D())console.log('[FS] loaded',added,'friends posts');});
    fsLoadPublicGroups().then(gs=>{A._publicGroups=gs;sR();});
    fsCheckInterests();fsCheckJobChats();fsCheckJobStatus();fsCleanupOrphanedGroups();fsSyncMyPosts();
    // Load group posts from Firestore
    if(hasFS()&&A.groups.length)A.groups.forEach(g=>{fbDb.collection('posts').where('groupId','==',g.id).where('status','==','open').orderBy('ts','desc').limit(50).get()
      .then(snap=>{var added=0;snap.docs.forEach(d=>{var p=d.data();if(!A.openJobs.has(p.id)&&!A.myJobs.find(j=>j.id===p.id)&&!A.blocked.has(p.creatorId)){A.openJobs.set(p.id,{...p,isFromContact:true});added++;}});if(added>0){persist();sR();}}).catch(e=>console.warn('[FS] groupPosts',e));});
    // Background: update group metadata from Firestore
    if(hasFS())A.groups.forEach(g=>{fsReadGroup(g.id).then(data=>{if(data){let changed=false;
      if(data.name&&data.name!==g.name&&(g.name==='Gruppe...'||g.name===g.id)){g.name=data.name;changed=true;}
      if(data.desc&&!g.desc){g.desc=data.desc;changed=true;}
      if(data.private!==undefined&&g.private!==data.private){g.private=data.private;changed=true;}
      if(data.members){g._members=data.members;data.members.forEach(mid=>{if(mid!==A.myId)tryC(mid);});changed=true;}
      if(data.creatorId&&!g.creatorId){g.creatorId=data.creatorId;changed=true;}
      if(data.imageUrl&&g.imageUrl!==data.imageUrl){g.imageUrl=data.imageUrl;changed=true;}
      if(changed){persist();sR();}}});});}
  else{if(D())console.log('[boot] phase:onboarding');go(ls('oSeen')?'setup':'onboarding');ss('oSeen','1');}
  // Garbage collection (prevents Scuttlebutt bloat)
  setInterval(async()=>{
    A.openJobs.forEach((j,id)=>{if(j.expiresAt&&j.expiresAt!==0&&j.expiresAt<now())A.openJobs.delete(id);});
    A.relayQ=A.relayQ.filter(r=>r.expiresAt>now());
    A.tempConns.forEach((tc,jid)=>{if(now()-tc.ts>30*864e5)A.tempConns.delete(jid);});
    await persist();sR();
  },3e5);
  // Periodic Firestore sync (every 5 min, tiered frequency)
  if(!A._syncRound)A._syncRound=0;
  setInterval(()=>{if(!A.myName||!hasFS())return;
    var r=A._syncRound;A._syncRound++;if(D())console.log('[sync] round',r);
    // EVERY round: posts + interests + status (critical path)
    fsLoadPublicPosts().then(posts=>{var added=0;posts.forEach(p=>{if(!A.openJobs.has(p.id)&&!A.myJobs.find(j=>j.id===p.id)&&!A.blocked.has(p.creatorId)){A.openJobs.set(p.id,{...p,isFromContact:false,isPublic:true});added++;}});if(added>0){if(A.screen!=='feed')A.unreadFeed+=added;updateB();persist();sR();}}).catch(()=>{});
    fsLoadFriendsPosts().then(posts=>{var added=0;posts.forEach(p=>{if(!A.openJobs.has(p.id)&&!A.myJobs.find(j=>j.id===p.id)&&!A.blocked.has(p.creatorId)){A.openJobs.set(p.id,{...p,isFromContact:true,isPublic:false});added++;}});if(added>0){if(A.screen!=='feed')A.unreadFeed+=added;updateB();persist();sR();}}).catch(()=>{});
    fsCheckInterests();
    fsCheckJobStatus();
    // EVERY 2nd round: job chats + public groups + group posts + group orphan cleanup
    if(r%2===0){
      fsCheckJobChats();
      fsLoadPublicGroups().then(gs=>{A._publicGroups=gs;sR();}).catch(()=>{});
      fsCleanupOrphanedGroups();
      if(A.groups.length)A.groups.forEach(g=>{fbDb.collection('posts').where('groupId','==',g.id).where('status','==','open').orderBy('ts','desc').limit(50).get()
        .then(snap=>{var added=0;snap.docs.forEach(d=>{var p=d.data();if(!A.openJobs.has(p.id)&&!A.myJobs.find(j=>j.id===p.id)&&!A.blocked.has(p.creatorId)){A.openJobs.set(p.id,{...p,isFromContact:true});added++;}});if(added>0){if(A.screen!=='groups')A.unreadGroups+=added;if(!(A.screen==='groupDetail'&&A.params.gid===g.id))A._unreadGroupPosts[g.id]=(A._unreadGroupPosts[g.id]||0)+added;updateB();persist();sR();}}).catch(()=>{});});
    }
    // EVERY 3rd round: master-slave sync
    if(r%3===0)fsSyncMyPosts();
    // EVERY 4th round: orphan job cleanup
    if(r%4===3)fsCleanupOrphanedJobs();
  },3e5);
  // Foreground recovery
  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&A.myName){
    if(A.peer?.disconnected&&!A.peer.destroyed)try{A.peer.reconnect();}catch(e){}
    A.contacts.forEach(c=>tryC(c.id));flushQ();sR();
    setTimeout(()=>{A.contacts.forEach(c=>tryC(c.id));flushQ();},2e3);
    setTimeout(()=>{A.contacts.forEach(c=>tryC(c.id));A.conns.forEach((_,id)=>{deliverR(id);offerRH(id);syncP(id);});flushQ();sR();},5e3);
  }});
  // Periodic reconnect health check
  setInterval(()=>{if(A.myName&&A.peer&&!A.ready&&!A.peer.destroyed)schRec();},3e4);
  if(D())console.log('[<- boot] complete');
}
boot();
</script>
