    ['jobs','openJobs','contacts','ratings','jobChats','dms','images','offlineQ','relayQ','activity','groups','config'].forEach(n=>{if(!d.objectStoreNames.contains(n))d.createObjectStore(n);});};

function dbGet(store,key){return new Promise((res,rej)=>{if(!db)return res(null);const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>res(null);});}
function dbPut(store,key,val){return new Promise((res,rej)=>{if(!db)return res();const tx=db.transaction(store,'readwrite');tx.objectStore(store).put(val,key);tx.oncomplete=()=>res();tx.onerror=()=>res();});}
function dbDel(store,key){return new Promise(res=>{if(!db)return res();const tx=db.transaction(store,'readwrite');tx.objectStore(store).delete(key);tx.oncomplete=()=>res();tx.onerror=()=>res();});}

      private:!!data.private,_members:Array.isArray(data.members)?data.members:[],imageUrl:data.imageUrl||null,hasPasscode:remoteHasPass,invitePolicy:data.invitePolicy||'members'});

  if(data.desc!==undefined&&data.desc!==g.desc){g.desc=data.desc||'';changed=true;}
  if(data.creatorId&&data.creatorId!==g.creatorId){g.creatorId=data.creatorId;changed=true;}
  if(data.private!==undefined&&!!data.private!==!!g.private){g.private=!!data.private;changed=true;}
  if(Array.isArray(data.members)){var curM=JSON.stringify(g._members||[]),nextM=JSON.stringify(data.members);if(curM!==nextM){g._members=data.members;changed=true;}}
  if((data.imageUrl||null)!==(g.imageUrl||null)){g.imageUrl=data.imageUrl||null;changed=true;}
  if(remoteHasPass!==!!g.hasPasscode){g.hasPasscode=remoteHasPass;changed=true;}

      var _lp2=new Set(lj2._myPoints||[]);_lp2.add(inv.idx);lj2._myPoints=[..._lp2].sort((a,b)=>a-b);

    }

  }else{notify('↩️','Takket nei til punkt');}
  persist();sR();showNextInvite();}

window.reinviteDirect=async function(jobId){

  if(!j||j.creatorId!==A.myId||j.visibility!=='direct'){notify('⚠️','Fant ikke direktejobben');return;}
  if(j.items?.length){notify('⚠️','Direktejobber kan ikke bruke punkter');return;}
  if(j.interests?.length||j.helperId||!['open','accepting'].includes(j.status)){notify('ℹ️','Denne jobben er allerede i gang');return;}

function vSearch(){const q=(A.params.q||'').toLowerCase();const myGids=new Set(A.groups.filter(g=>!g.private).map(g=>g.id));

    results.push({...p,id:pid,mutual,sharedG,sameFylke,score:mutual*3+sharedG*2+sameFylke});});
  results.sort((a,b)=>b.score-a.score);results=results.slice(0,50);

window.joinKnownGroup=async id=>{if(D())console.log('[joinKnownGroup]',{id});if(!/^g[a-zA-Z0-9]{1,20}$/.test(id))return;
  if(A.groups.find(g=>g.id===id)){notify('⚠️','Allerede medlem');return;}

  var data=await fsReadGroup(id);

    dropMissingGroup(id,'joinKnownGroup — doc missing');notify('⚠️','Gruppen finnes ikke lenger');return;}
  if(!data.private){requestGroupJoin(id,data.name||id);return;}
  notify('🔒','Denne gruppen er privat. Du må bli invitert for å bli med.');};
window.requestGroupJoin=(gid,gname)=>{if(A.groups.find(g=>g.id===gid)){notify('⚠️','Allerede medlem');return;}
  if(A._myGroupRequests[gid]){notify('ℹ️','Du har allerede sendt forespørsel til denne gruppen');return;}
  showConfirm('🏘️ Medlemsforespørsel','Send medlemsforespørsel til «'+(gname||'gruppen')+'»?','Send',async()=>{
    var data=await fsReadGroup(gid);
    if(!data){notify('⚠️','Gruppen finnes ikke lenger');return;}
    if(data.private){notify('⚠️','Denne gruppen er privat');return;}
    var adminId=data.creatorId||'';
    var reqTs=Date.now();
    var ok=await fsWriteGroupRequest(gid,{peerId:A.myId,name:A.myName,avatar:ls('oAvatar')||'',bio:A.myBio||'',fylke:A.myFylke||'',by:A.myBy||'',gname:data.name||gname||gid,adminId,ts:reqTs,status:'pending'});
    if(ok){A._myGroupRequests[gid]={name:data.name||gname||'',ts:reqTs};persist();
      if(adminId&&adminId!==A.myId){A.tempConns.set('greq:'+gid,{peerId:adminId,name:data.name||gname||'',ts:now()});send(adminId,{t:'GQ',gid,peerId:A.myId,name:A.myName,avatar:ls('oAvatar')||'',bio:A.myBio||'',fylke:A.myFylke||'',by:A.myBy||'',gname:data.name||gname||gid,ts:reqTs});}
      notify('✅','Forespørsel sendt!');}

window.approveGroupRequest=async(gid,peerId,name)=>{if(D())console.log('[approveGroupRequest]',{gid,peerId});
  const g=A.groups.find(x=>x.id===gid);if(!g){notify('⚠️','Gruppe ikke funnet');return;}
  var res=await fsJoinGroup(gid,peerId);
  if(res.missing){notify('⚠️','Gruppen finnes ikke lenger');return;}
  if(!res.ok){notify('⚠️','Kunne ikke legge til medlem');return;}
  await fsResolveGroupRequest(gid,peerId,g.creatorId||A.myId,'approved');
  if(!Array.isArray(g._members))g._members=[A.myId];
  if(!g._members.includes(peerId))g._members.push(peerId);
  A._groupRequests[gid]=(A._groupRequests[gid]||[]).filter(r=>r.peerId!==peerId);
  A.tempConns.set('grr:'+gid+':'+peerId,{peerId,name:name||'',ts:now()});send(peerId,{t:'GR',gid,gname:g.name||gid,status:'approved'});
  persist();notify('✅',(name||'Bruker')+' ble med i gruppen!');render();};
window.denyGroupRequest=async(gid,peerId,name)=>{if(D())console.log('[denyGroupRequest]',{gid,peerId});

  A.tempConns.set('grr:'+gid+':'+peerId,{peerId,name:name||'',ts:now()});send(peerId,{t:'GR',gid,gname:g?.name||gid,status:'declined'});

window.deleteGroup=async(gid)=>{if(D())console.log('[deleteGroup]',gid);

window.doCreateGroup=async()=>{if(D())console.log('[-> doCreateGroup]');const n=$('gn')?.value?.trim();if(!n){notify('⚠️','Skriv et gruppenavn');return;}
  const priv=A.nb._gPriv!==false;
  let id;{const raw=n+'|'+A.myId+'|'+now()+'|'+Math.random();const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(raw));id='g'+ab64(h).replace(/[^a-zA-Z0-9]/g,'').substr(0,14);}
  const desc=$('gd')?.value?.trim()||'';
  const fylke=A.nb._gFylke||A.myFylke||'';
  const rawPass=priv?($('gpass')?.value?.trim()||''):'';
  const ph=rawPass?await hashPass(rawPass):null;
  let imageUrl=null;
  if(A.nb._gImg&&hasFB()){try{imageUrl=await fbUpload(A.nb._gImg,'groups/'+id+'.webp');}catch(e){if(D())console.log('[doCreateGroup] img upload err',e.message);notify('⚠️','Kunne ikke laste opp gruppebildet');return;}}
  const fsData={name:n,nameLower:n.toLowerCase(),desc,private:priv,fylke,imageUrl:imageUrl||null,creatorId:A.myId,createdAt:Date.now(),members:[A.myId],hasPasscode:!!ph,invitePolicy:'members'};
  if(ph)fsData.passHash=ph;
  if(!(await fsWriteGroup(id,fsData))){notify('⚠️','Kunne ikke opprette gruppen akkurat nå');return;}
  A.groups.push({id,name:n,desc,creatorId:A.myId,createdTs:now(),isGroup:true,private:priv,_members:[A.myId],imageUrl,fylke,hasPasscode:!!ph,invitePolicy:'members'});
  persist();bcast({t:'HI',...myPres()});
  // GRP gossip removed — public group discovery via Firestore (fsLoadPublicGroups) only
  A.nb={};
  if(priv){go('groupCreated',{gid:id});}else{notify('✅','Gruppe opprettet!');go('groupDetail',{gid:id});}};

  await loadState();if(D())console.log('[boot] phase:state-loaded');
  initFB();if(D())console.log('[boot] phase:firebase-init');
  if(typeof Notification!=='undefined'&&Notification.permission==='default')try{Notification.requestPermission();}catch(e){}
  if(A.myName){if(D())console.log('[boot] phase:crypto');try{await initCrypto();}catch(e){console.error(e);}
    // Migration: fix jobs corrupted by old BS bug (owner's status overwritten to 'pending')
    var _migrated=0;A.myJobs.forEach(j=>{if(j.creatorId===A.myId&&j.status==='pending'){j.status='open';_migrated++;}});
    if(_migrated){console.log('[MIGRATE] Fixed',_migrated,'owner jobs from pending→open');persist();}
    // Migration: remove orphaned done jobs without helperId (corrupt from old sync bug)
    var _orphaned=0;A.myJobs=A.myJobs.filter(j=>{if(j.status==='done'&&!j.helperId&&!j.isHelper){_orphaned++;fsDeletePost(j.id);return false;}return true;});
    if(_orphaned){console.log('[MIGRATE] Removed',_orphaned,'orphaned done jobs');persist();}
    // Migration: ensure all groups have creatorId
    A.groups.forEach(g=>{if(!g.creatorId){g.creatorId=A.myId;}});
    // Migration: fix cancelled jobs with helperId
    A.myJobs.forEach(j=>{if(j.status==='cancelled'&&j.helperId){j.helperId=null;j.helperName=null;j.helperDone=false;}});
    // Migration: clean orphaned jobChats
    var _chatCleaned=0;Object.keys(A.jobChats).forEach(k=>{if(!A.myJobs.find(j=>j.id===k)){delete A.jobChats[k];_chatCleaned++;}});
    if(_chatCleaned){console.log('[MIGRATE] Cleaned',_chatCleaned,'orphaned jobChats');persist();}
    if(D())console.log('[boot] phase:firestore-reconcile');
    await fsBootReconcile();
    if(D())console.log('[boot] phase:peer');initPeer();$('nav').style.display='block';go('feed');
    if(D())console.log('[boot] phase:firestore-sync');
    // Background: load discoverable posts from Firestore
    fsLoadPublicPosts().then(posts=>{var added=0;posts.forEach(p=>{if(!A.openJobs.has(p.id)&&!A.myJobs.find(j=>j.id===p.id)&&!A.blocked.has(p.creatorId)){A.openJobs.set(p.id,{...p,isFromContact:false,isPublic:true});added++;}});if(added>0){persist();sR();}if(D())console.log('[FS] loaded',added,'public posts');});
    fsLoadFriendsPosts().then(posts=>{var added=0;posts.forEach(p=>{if(!A.openJobs.has(p.id)&&!A.myJobs.find(j=>j.id===p.id)&&!A.blocked.has(p.creatorId)){A.openJobs.set(p.id,{...p,isFromContact:true,isPublic:false});added++;}});if(added>0){persist();sR();}if(D())console.log('[FS] loaded',added,'friends posts');});
    fsLoadDirectPosts().then(posts=>{var added=0,_new=[];posts.forEach(p=>{if(!A.openJobs.has(p.id)&&!A.myJobs.find(j=>j.id===p.id)&&!A.blocked.has(p.creatorId)){A.openJobs.set(p.id,{...p,isFromContact:true,isPublic:false});A._unreadJobs[p.id]=(A._unreadJobs[p.id]||0)+1;queueDirectInvite(p);added++;_new.push(p);}});
      var removed=pruneDirectOpenJobs(posts);
      if(added>0||removed>0){if(added>0&&A.screen!=='mine')A.unreadActivity+=added;updateB();persist();sR();if(added>0)showNextInvite();if(added>0)_new.slice(0,3).forEach(p=>notify('📩 '+(p.creatorName||''),(p.title||'').substr(0,40),()=>go('jobDetail',{jobId:p.id})));}
      if(D())console.log('[FS] loaded',added,'direct posts');});
    fsCheckInterests();fsCheckJobChats();fsCheckMyJobChatAcks();fsCheckMyDMs();fsCheckMyDMAcks();fsCheckRatings();fsCheckJobStatus();fsCheckPointUpdates();fsCleanupOrphanedGroups();fsSyncMyPosts();fsCheckMyInvitations();fsCheckMyGroupRequests();fsCheckMyGroups();fsCheckAdminGroupRequests();
    // Load group posts from Firestore
    if(hasFS()&&A.groups.length)A.groups.forEach(g=>{fsLoadGroupPosts(g.id)
      .then(posts=>{var added=0;posts.forEach(p=>{if(!A.openJobs.has(p.id)&&!A.myJobs.find(j=>j.id===p.id)&&!A.blocked.has(p.creatorId)){A.openJobs.set(p.id,{...p,isFromContact:true});added++;}});if(added>0){persist();sR();}}).catch(e=>console.warn('[FS] groupPosts',e));});
    // Background: update group metadata from Firestore
    if(hasFS())A.groups.forEach(g=>{fsReadGroup(g.id).then(data=>{if(data){let changed=false;
      if(data.name&&data.name!==g.name&&(g.name==='Gruppe...'||g.name===g.id)){g.name=data.name;changed=true;}
      if(data.desc&&!g.desc){g.desc=data.desc;changed=true;}
      if(data.private!==undefined&&g.private!==data.private){g.private=data.private;changed=true;}
      if(data.members){g._members=data.members;data.members.forEach(mid=>{if(mid!==A.myId)tryC(mid);});changed=true;}
      if(data.creatorId&&!g.creatorId){g.creatorId=data.creatorId;changed=true;}
      if(data.imageUrl&&g.imageUrl!==data.imageUrl){g.imageUrl=data.imageUrl;changed=true;}
      const remoteHasPass=data.hasPasscode!==undefined?data.hasPasscode:!!data.passHash;
      if(g.hasPasscode!==remoteHasPass){g.hasPasscode=remoteHasPass;changed=true;}
      const remotePol=data.invitePolicy||'members';
      if(g.invitePolicy!==remotePol){g.invitePolicy=remotePol;changed=true;}
      if(changed){persist();sR();}}});});}
  else{if(D())console.log('[boot] phase:onboarding');go(ls('oSeen')?'setup':'onboarding');ss('oSeen','1');}
  // Garbage collection (prevents Scuttlebutt bloat)
  setInterval(async()=>{
    A.openJobs.forEach((j,id)=>{if(j.expiresAt&&j.expiresAt!==0&&j.expiresAt<now())dropOpenJobLocal(id);});
    A.relayQ=A.relayQ.filter(r=>r.expiresAt>now());
    A.tempConns.forEach((tc,jid)=>{if(now()-tc.ts>30*864e5)A.tempConns.delete(jid);});
    await persist();sR();
  },3e5);
  // Periodic Firestore sync (every 5 min, tiered frequency)
  if(!A._syncRound)A._syncRound=0;
  setInterval(()=>{if(!A.myName||!hasFS())return;
    var r=A._syncRound;A._syncRound++;if(D())console.log('[sync] round',r);
    // EVERY round: posts + interests + status (critical path)
    fsLoadPublicPosts().then(posts=>{var added=0;posts.forEach(p=>{if(!A.openJobs.has(p.id)&&!A.myJobs.find(j=>j.id===p.id)&&!A.blocked.has(p.creatorId)){A.openJobs.set(p.id,{...p,isFromContact:false,isPublic:true});added++;}});if(added>0){if(A.screen!=='feed')A.unreadFeed+=added;updateB();persist();sR();}}).catch(()=>{});
    fsLoadFriendsPosts().then(posts=>{var added=0;posts.forEach(p=>{if(!A.openJobs.has(p.id)&&!A.myJobs.find(j=>j.id===p.id)&&!A.blocked.has(p.creatorId)){A.openJobs.set(p.id,{...p,isFromContact:true,isPublic:false});added++;}});if(added>0){if(A.screen!=='feed')A.unreadFeed+=added;updateB();persist();sR();}}).catch(()=>{});
    fsLoadDirectPosts().then(posts=>{var added=0,_new=[];posts.forEach(p=>{if(!A.openJobs.has(p.id)&&!A.myJobs.find(j=>j.id===p.id)&&!A.blocked.has(p.creatorId)){A.openJobs.set(p.id,{...p,isFromContact:true,isPublic:false});A._unreadJobs[p.id]=(A._unreadJobs[p.id]||0)+1;queueDirectInvite(p);added++;_new.push(p);}});
      var removed=pruneDirectOpenJobs(posts);
      if(added>0||removed>0){if(added>0&&A.screen!=='mine')A.unreadActivity+=added;updateB();persist();sR();if(added>0)showNextInvite();if(added>0)_new.slice(0,2).forEach(p=>notify('📩 '+(p.creatorName||''),(p.title||'').substr(0,40),()=>go('jobDetail',{jobId:p.id})));}}).catch(()=>{});
    fsCheckInterests();fsCheckMyDMs();fsCheckMyDMAcks();
    fsCheckJobStatus();fsCheckMyInvitations();fsCheckMyGroupRequests();fsCheckMyGroups();fsCheckAdminGroupRequests();
    // EVERY 2nd round: job chats + public groups + group posts + group orphan cleanup + point updates
    if(r%2===0){
      fsCheckJobChats();fsCheckMyJobChatAcks();fsCheckPointUpdates();
      if(['groups','groupDetail'].includes(A.screen))fsRefreshPublicGroupsIfNeeded();
      fsCleanupOrphanedGroups();
      if(['feed','groups','groupDetail'].includes(A.screen))fsRefreshGroupPostsIfNeeded();
    }
    // EVERY 3rd round: master-slave sync
    if(r%3===0){fsSyncMyPosts();fsCheckRatings();}
    // EVERY 4th round: orphan job cleanup
    if(r%4===3)fsCleanupOrphanedJobs();
  },3e5);
  // Foreground recovery
  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&A.myName){
    if(A.peer?.disconnected&&!A.peer.destroyed)try{A.peer.reconnect();}catch(e){}
    A.contacts.forEach(c=>tryC(c.id));flushQ();fsCheckJobChats();fsCheckMyJobChatAcks();fsCheckMyDMs();fsCheckMyDMAcks();fsCheckRatings();sR();
    setTimeout(()=>{A.contacts.forEach(c=>tryC(c.id));flushQ();},2e3);
    setTimeout(()=>{A.contacts.forEach(c=>tryC(c.id));A.conns.forEach((_,id)=>{deliverR(id);offerRH(id);syncP(id);});flushQ();sR();},5e3);
  }});
  // Periodic reconnect health check
  setInterval(()=>{if(A.myName&&A.peer&&!A.ready&&!A.peer.destroyed)schRec();},3e4);
  if(D())console.log('[<- boot] complete');
}
boot();
</script>
